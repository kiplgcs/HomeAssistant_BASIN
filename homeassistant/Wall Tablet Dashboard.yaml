title: Wall Tablet Dashboard
views:
  - title: Главная
    path: wall-home
    icon: mdi:home
    type: sections
    max_columns: 3
    sections:
      - type: grid
        column_span: 3
        columns: 6
        square: false
        cards:
          - type: heading
            heading: Верхняя панель
            icon: mdi:weather-partly-cloudy
            heading_style: title
          - type: tile
            entity: sensor.date_time
            name: Время
            icon: mdi:clock-outline
            vertical: true
            features_position: bottom
          - type: tile
            entity: weather.openweathermap
            name: Погода
            vertical: true
            features_position: bottom
          - type: tile
            entity: sensor.openweathermap_temperature
            name: Температура
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.openweathermap_humidity
            name: Влажность
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.openweathermap_wind_speed
            name: Ветер
            vertical: false
            features_position: bottom
          - type: tile
            entity: sensor.openweathermap_uv_index
            name: UV
            vertical: false
            features_position: bottom
      - type: grid
        column_span: 2
        columns: 2
        square: false
        cards:
          - type: heading
            heading: Центр · Калитка и быстрые действия
            icon: mdi:gate
          - type: button
            name: Калитка
            icon: mdi:gate-open
            entity: button.gate_open
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.gate_open
            show_state: true
          - type: button
            name: Вечер
            icon: mdi:weather-night
            entity: script.evening_mode
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.evening_mode
          - type: button
            name: Всё выключить
            icon: mdi:power
            entity: script.all_off
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.all_off
      - type: grid
        column_span: 1
        columns: 1
        square: false
        cards:
          - type: heading
            heading: Свет
            icon: mdi:lightbulb-group
          - type: tile
            entity: switch.0xa4c138c12b08a062_left
            name: Дом
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.0xa4c138c12b08a062_right
            name: Двор
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.0x54ef441001393219_right
            name: Зал -малый свет
            icon: mdi:chandelier
            show_entity_picture: false
            hide_state: false
            vertical: false
            features_position: bottom
          - type: tile
            entity: select.esp32_ac_a7_04_ee_11_70_lamp_mode
            name:
              type: area
            vertical: false
            features_position: bottom
      - type: grid
        column_span: 3
        columns: 3
        square: false
        cards:
          - type: heading
            heading: Камеры
            icon: mdi:cctv
          - show_state: true
            show_name: true
            camera_view: live
            fit_mode: contain
            type: picture-entity
            entity: camera.dvor_kamera2_mainstream
            name: Калитка
            camera_image: camera.dvor_kamera2_mainstream
          - show_state: true
            show_name: true
            camera_view: live
            fit_mode: cover
            type: picture-entity
            entity: camera.ipc_nt98566_n8f_mainstream
            name: Двор
            camera_image: camera.ipc_nt98566_n8f_mainstream
          - show_state: true
            show_name: true
            camera_view: live
            fit_mode: cover
            type: picture-entity
            entity: camera.ipcam_2k_mainstreamprofile
            name: Вход
            camera_image: camera.ipcam_2k_mainstreamprofile
  - title: Камеры
    path: wall-cameras
    icon: mdi:cctv
    type: sections
    max_columns: 3
    sections:
      - type: grid
        column_span: 3
        columns: 3
        square: false
        cards:
          - show_state: true
            show_name: true
            camera_view: live
            fit_mode: cover
            type: picture-entity
            entity: camera.dvor_kamera2_mainstream
            name: Калитка
            camera_image: camera.dvor_kamera2_mainstream
          - show_state: true
            show_name: true
            camera_view: live
            fit_mode: cover
            type: picture-entity
            entity: camera.ipc_nt98566_n8f_mainstream
            name: Двор
            camera_image: camera.ipc_nt98566_n8f_mainstream
          - show_state: true
            show_name: true
            camera_view: live
            fit_mode: cover
            type: picture-entity
            entity: camera.ipcam_2k_mainstreamprofile
            name: Вход
            camera_image: camera.ipcam_2k_mainstreamprofile
  - title: Свет
    path: wall-lights
    icon: mdi:lightbulb-group
    type: sections
    max_columns: 2
    sections:
      - type: grid
        column_span: 2
        columns: 2
        square: false
        cards:
          - type: tile
            entity: switch.0xa4c138c12b08a062_left
            name: Дом
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.0xa4c138c12b08a062_right
            name: Двор над дверью
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.0x54ef441001393219_right
            name: Зал-мало
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.0x54ef441001393219_left
            name: Зал-больше
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.outdoor_light_manual_2
            name:
              type: entity
            vertical: false
            features_position: bottom
          - type: tile
            entity: select.esp32_ac_a7_04_ee_11_70_lamp_mode
            name:
              type: area
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.rgb_strip_power_2
            name: RGB бассейн
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.0xa4c13810d1762ba3
            name:
              type: entity
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.zigebee_smart_meter_pro_switch
            name: LED забор
            vertical: false
            features_position: bottom
  - title: Система
    path: wall-system
    icon: mdi:cog
    type: sections
    max_columns: 2
    sections:
      - type: grid
        column_span: 2
        columns: 2
        square: false
        cards:
          - type: entities
            title: Система
            show_header_toggle: false
            entities:
              - sensor.time
              - weather.home
          - type: markdown
            content: |
              Эта версия сделана на стандартных карточках Lovelace,
              чтобы карточки открывались и редактировались через Web UI.