- id: '1774333666055'
  alias: Переключение режима ANJ солнечного инвертора (SOL/SUB с гистерезисом)
  description: '1) Цель: автоматически и бережно переключать Program 01 между SOL
    и SUB, чтобы снизить потребление из сети и избежать частых «дёрганий» инвертора.
    2) Переход в SOL: при СТАБИЛЬНО хорошем солнце. Учитываются 2 сценария: (а) реально
    высокая генерация (PV ток/мощность), или (б) минимальная нагрузка дома (70-250
    Вт), когда потенциал солнца высокий, но фактическая мощность PV может быть невысокой
    из-за малого потребления. Выдержка 10 минут + доп.проверка ещё 2 минуты перед
    записью режима. 3) Переход в SUB: при длительной нехватке солнца (низкие PV-параметры),
    при стабильном высоком импорте из сети, а также принудительно за 30 минут до заката
    для мягкого вечернего перехода. 4) Гистерезис: пороги и длительности для входа
    в SOL и возврата в SUB различаются, поэтому режим не «пилит» на облаках/рассвете/закате.
    5) Антидребезг: между любыми переключениями выдерживается минимум 15 минут, и
    переключение выполняется только если текущий режим отличается от целевого. 6)
    Как применяется: automation меняет input_select.anenji_cfg_program_01_output_source_priority
    (SOL или SUB) и сразу вызывает script.anenji_inverter_write_single_config_to_modbus
    для фактической записи в инвертор. 7) Что можно настраивать: пороги (V/A/W), временные
    выдержки и интервал periodic_recheck (/15) редактируются в YAML/GUI под вашу станцию
    и климат.'
  triggers:
  - trigger: template
    value_template: '{% set v = states(''sensor.napriazhenie_pv_pv_voltage'')|float(0)
      %} {% set i = states(''sensor.tok_pv_pv_current'')|float(0) %} {% set p = states(''sensor.moshchnost_pv_pv_power'')|float(0)
      %} {% set load = states(''sensor.moshchnost_nagruzki_load_power'')|float(0)
      %} {% set grid = states(''sensor.moshchnost_seti_grid_power'')|float(0) %} {%
      set high_generation = v > 335 and (i > 3 or p > 900) %} {% set low_load_high_potential
      = v > 355 and load >= 70 and load <= 250 and grid < 250 %} {{ is_state(''sun.sun'',
      ''above_horizon'') and (high_generation or low_load_high_potential) }}'
    for: 00:10:00
    id: to_sol_stable
  - trigger: template
    value_template: '{% set v = states(''sensor.napriazhenie_pv_pv_voltage'')|float(0)
      %} {% set i = states(''sensor.tok_pv_pv_current'')|float(0) %} {% set p = states(''sensor.moshchnost_pv_pv_power'')|float(0)
      %} {{ is_state(''sun.sun'', ''below_horizon'') or ((v < 300 or p < 550) and
      i < 1.8) }}'
    for: 00:15:00
    id: to_sub_low_sun
  - trigger: numeric_state
    entity_id: sensor.moshchnost_seti_grid_power
    above: 700
    for: 00:08:00
    id: to_sub_grid_import_high
  - trigger: sun
    event: sunset
    offset: -00:30:00
    id: sub_before_sunset
  - trigger: time_pattern
    minutes: /15
    id: periodic_recheck
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id in [''to_sol_stable'', ''periodic_recheck'']
          }}'
      - condition: sun
        after: sunrise
        before: sunset
      - condition: template
        value_template: '{% set v = states(''sensor.napriazhenie_pv_pv_voltage'')|float(0)
          %} {% set i = states(''sensor.tok_pv_pv_current'')|float(0) %} {% set p
          = states(''sensor.moshchnost_pv_pv_power'')|float(0) %} {% set load = states(''sensor.moshchnost_nagruzki_load_power'')|float(0)
          %} {% set grid = states(''sensor.moshchnost_seti_grid_power'')|float(0)
          %} {% set high_generation = v > 335 and (i > 3 or p > 900) %} {% set low_load_high_potential
          = v > 355 and load >= 70 and load <= 250 and grid < 250 %} {{ high_generation
          or low_load_high_potential }}'
      - condition: template
        value_template: '{{ states(''input_select.anenji_cfg_program_01_output_source_priority'')
          != ''SOL'' }}'
      - condition: template
        value_template: '{{ (as_timestamp(now()) - as_timestamp(states.input_select.anenji_cfg_program_01_output_source_priority.last_changed))
          > 900 }}'
      sequence:
      - delay: 00:02:00
      - condition: template
        value_template: '{% set v = states(''sensor.napriazhenie_pv_pv_voltage'')|float(0)
          %} {% set i = states(''sensor.tok_pv_pv_current'')|float(0) %} {% set p
          = states(''sensor.moshchnost_pv_pv_power'')|float(0) %} {% set load = states(''sensor.moshchnost_nagruzki_load_power'')|float(0)
          %} {% set grid = states(''sensor.moshchnost_seti_grid_power'')|float(0)
          %} {% set high_generation = v > 330 and (i > 2.5 or p > 800) %} {% set low_load_high_potential
          = v > 350 and load >= 70 and load <= 250 and grid < 300 %} {{ high_generation
          or low_load_high_potential }}'
      - action: input_select.select_option
        target:
          entity_id: input_select.anenji_cfg_program_01_output_source_priority
        data:
          option: SOL
      - action: script.anenji_inverter_write_single_config_to_modbus
        data:
          target_entity_id: input_select.anenji_cfg_program_01_output_source_priority
    - conditions:
      - condition: template
        value_template: '{{ trigger.id in [''to_sub_low_sun'', ''to_sub_grid_import_high'',
          ''sub_before_sunset'', ''periodic_recheck''] }}'
      - condition: template
        value_template: '{% set v = states(''sensor.napriazhenie_pv_pv_voltage'')|float(0)
          %} {% set i = states(''sensor.tok_pv_pv_current'')|float(0) %} {% set p
          = states(''sensor.moshchnost_pv_pv_power'')|float(0) %} {% set grid = states(''sensor.moshchnost_seti_grid_power'')|float(0)
          %} {{ is_state(''sun.sun'', ''below_horizon'') or ((v < 300 or p < 550)
          and i < 1.8) or grid > 700 }}'
      - condition: template
        value_template: '{{ states(''input_select.anenji_cfg_program_01_output_source_priority'')
          != ''SUB'' }}'
      - condition: template
        value_template: '{{ (as_timestamp(now()) - as_timestamp(states.input_select.anenji_cfg_program_01_output_source_priority.last_changed))
          > 900 }}'
      sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.anenji_cfg_program_01_output_source_priority
        data:
          option: SUB
      - action: script.anenji_inverter_write_single_config_to_modbus
        data:
          target_entity_id: input_select.anenji_cfg_program_01_output_source_priority
  mode: single
- id: anenji_program_01_set_from_mqtt
  alias: ANENJI Program 01 из MQTT в инвертор
  mode: queued
  trigger:
  - platform: mqtt
    topic: homeassistant/anenji/program_01/set
  variables:
    requested_mode: "{{ trigger.payload | upper | trim }}"
  condition:
  - condition: template
    value_template: "{{ requested_mode in ['UTI', 'SOL', 'SBU', 'SUB', 'SUF'] }}"
  action:
  - service: input_select.select_option
    target:
      entity_id: input_select.anenji_cfg_program_01_output_source_priority
    data:
      option: "{{ requested_mode }}"
  - service: script.anenji_inverter_write_single_config_to_modbus
    data:
      target_entity_id: input_select.anenji_cfg_program_01_output_source_priority

- id: anenji_program_01_publish_to_mqtt
  alias: ANENJI Program 01 публикация в MQTT
  mode: queued
  trigger:
  - platform: state
    entity_id: input_select.anenji_cfg_program_01_output_source_priority
  - platform: homeassistant
    event: start
  action:
  - service: mqtt.publish
    data:
      topic: homeassistant/anenji/program_01/state
      payload: "{{ states('input_select.anenji_cfg_program_01_output_source_priority') }}"
      retain: true

- id: anenji_surplus_power_publish_to_mqtt
  alias: ANENJI Surplus Power публикация в MQTT
  mode: queued
  trigger:
  - platform: state
    entity_id: sensor.anenji_surplus_power
  - platform: homeassistant
    event: start
  condition:
  - condition: template
    value_template: "{{ states('sensor.anenji_surplus_power') not in ['unknown', 'unavailable', 'none', ''] }}"
  action:
  - service: mqtt.publish
    data:
      topic: homeassistant/anenji/surplus_power/state
      payload: "{{ states('sensor.anenji_surplus_power') }}"
      retain: true