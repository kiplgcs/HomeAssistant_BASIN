      - type: grid
        column_span: 3
        columns: 2
        square: false
        cards:
          - type: heading
            heading: Сервис и диагностика
            icon: mdi:stethoscope
          - type: entities
            title: Загрузка и паспортные данные
            show_header_toggle: false
            entities:
              - entity: sensor.nagruzka_load_percentage
                name: Загрузка, %
              - entity: sensor.nominalnaia_moshchnost_rated_power
                name: Номинальная мощность
              - entity: sensor.kolichestvo_iacheek_rated_cells_j
                name: Номинальное число ячеек
          - type: gauge
            name: Загрузка нагрузки
            entity: sensor.nagruzka_load_percentage
            min: 0
            max: 100
            unit: '%'
            severity:
              green: 1
              yellow: 50
              red: 80
          - type: entities
            title: Сервисные регистры и режимы
            show_header_toggle: false
            entities:
              - entity: sensor.maska_preduprezhdenii_warning_mask_i
                name: Маска предупреждений
              - entity: sensor.sukhoi_kontakt_dry_contact
                name: Режим dry contact
              - entity: sensor.rezhim_zapuska_boot_mode
                name: Режим запуска · Сервисный параметр
              - entity: sensor.udalennyi_vykliuchatel_remote_switch
                name: Удалённый выключатель
          - type: markdown
            content: >
              Диагностические битовые маски показаны как исходные значения.


              TODO: добавить template-сенсоры с расшифровкой `warning mask` и
              `fault bitmask` по битам для человекочитаемой диагностики.
          - type: entities
            title: Журнал ошибок и аварийные записи
            show_header_toggle: false
            entities:
              - entity: sensor.info_khranilishcha_oshibok_fault_record_storage_info
                name: Инфо хранилища ошибок
          - type: markdown
            content: >
              TODO: `Program version`, `Last fault record` и `Run log`
              подтверждены документацией, но в текущей конфигурации ещё не
              созданы как сущности Home Assistant.
      - type: grid
        column_span: 3
        columns: 2
        square: false
        cards:
          - type: heading
            heading: Lithium / BMS
            icon: mdi:battery-heart-variant
          - type: entities
            title: Литиевая батарея / ограничения BMS
