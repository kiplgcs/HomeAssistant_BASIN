# =========================
# Конфигурация инвертора ANENJI (Program 01..46)
# =========================
# Важно: файл должен содержать только валидный YAML.
input_select:
  anenji_cfg_program_01_output_source_priority:
    name: "Program 01 · Приоритет источника питания"
    options: ["UTI", "SOL", "SBU", "SUB", "SUF"]
    initial: "SBU"
  anenji_cfg_program_03_input_voltage_range:
    name: "Program 03 · Диапазон входного напряжения"
    options: ["APL", "UPS"]
    initial: "UPS"
  anenji_cfg_program_05_battery_type:
    name: "Program 05 · Тип батареи"
    options: ["AGM", "FLd", "USE", "LI2", "LI4", "LIb"]
    initial: "AGM"
  anenji_cfg_program_16_charge_source_priority:
    name: "Program 16 · Приоритет источника зарядки"
    options: ["CSO", "SNU", "OSO"]
    initial: "SNU"
  anenji_cfg_program_08_output_voltage:
    name: "Program 08 · Выходное напряжение"
    options: ["220V", "230V", "240V"]
    initial: "230V"
  anenji_cfg_program_09_output_frequency:
    name: "Program 09 · Выходная частота"
    options: ["50Hz", "60Hz"]
    initial: "50Hz"
  anenji_cfg_program_10_auto_bypass_mode:
    name: "Program 10 · Автоматический обход"
    options: ["AnL", "AEO"]
    initial: "AnL"
  anenji_cfg_program_18_buzzer_mode:
    name: "Program 18 · Режим зуммера"
    options: ["nd1", "nd2", "nd3", "nd4"]
    initial: "nd4"
  anenji_cfg_program_19_screen_return_mode:
    name: "Program 19 · Возврат экрана"
    options: ["ESP", "bEP"]
    initial: "ESP"
  anenji_cfg_program_20_backlight_mode:
    name: "Program 20 · Подсветка"
    options: ["LON", "LOF"]
    initial: "LON"
  anenji_cfg_program_25_modbus_id_mode:
    name: "Program 25 · Modbus ID (режим применения)"
    options: ["Только подготовить значение", "Требует отдельного подтверждения"]
    initial: "Только подготовить значение"
  anenji_cfg_program_23_overload_bypass:
    name: "Program 23 · Обход при перегрузке"
    options: ["bYd", "bYE"]
    initial: "bYE"
  anenji_cfg_program_32_cv_to_float_time_mode:
    name: "Program 32 · Время заряда (CV→Float)"
    options: ["AUT", "5", "10", "15", "30", "60", "120", "300", "600", "900"]
    initial: "AUT"
  anenji_cfg_program_46_overcharge_protection_mode:
    name: "Program 46 · Защита от макс. тока разряда"
    options: ["OFF", "50A"]
    initial: "OFF"
input_boolean:
  anenji_cfg_sync_from_inverter_active:
    name: "ANENJI · Синхронизация настроек из инвертора"
  anenji_cfg_program_04_power_saving:
    name: "Program 04 · Энергосбережение"
  anenji_cfg_program_06_overload_restart:
    name: "Program 06 · Перезапуск после перегрузки"
  anenji_cfg_program_07_overtemp_restart:
    name: "Program 07 · Перезапуск после перегрева"
  anenji_cfg_program_33_equalization_enable:
    name: "Program 33 · Выравнивание батареи"
  anenji_cfg_program_39_force_equalization:
    name: "Program 39 · Принудительное выравнивание"
  anenji_cfg_program_41_lithium_auto_activation:
    name: "Program 41 · Автоактивация литиевой АКБ"
  anenji_cfg_program_42_lithium_manual_activation:
    name: "Program 42 · Ручная активация литиевой АКБ"
input_number:
  anenji_cfg_program_11_max_charge_current:
    name: "Program 11 · Максимальный ток зарядки, A"
    min: 0
    max: 90
    step: 1
    mode: box
    initial: 30
  anenji_cfg_program_12_back_to_utility_voltage:
    name: "Program 12 · Переход на сеть, V"
    min: 44
    max: 57.2
    step: 0.1
    mode: box
    initial: 48
  anenji_cfg_program_13_back_to_battery_voltage:
    name: "Program 13 · Возврат на батарею, V"
    min: 44
    max: 60
    step: 0.1
    mode: box
    initial: 54
  anenji_cfg_program_26_bulk_absorption_voltage:
    name: "Program 26 · Напряжение зарядки (C.V), V"
    min: 48
    max: 62
    step: 0.1
    mode: box
    initial: 56.4
  anenji_cfg_program_27_float_voltage:
    name: "Program 27 · Плавающее напряжение зарядки, V"
    min: 48
    max: 58
    step: 0.1
    mode: box
    initial: 54.0
  anenji_cfg_program_29_low_dc_cutoff_voltage:
    name: "Program 29 · Низкое напряжение отключения постоянного тока, V"
    min: 40
    max: 54
    step: 0.1
    mode: box
    initial: 46.0
  anenji_cfg_program_34_equalization_voltage:
    name: "Program 34 · Напряжение выравнивания, V"
    min: 48
    max: 64
    step: 0.1
    mode: box
    initial: 58.4
  anenji_cfg_program_35_equalization_time:
    name: "Program 35 · Время выравнивния, min"
    min: 0
    max: 900
    step: 1
    mode: box
    initial: 60
  anenji_cfg_program_36_equalization_timeout:
    name: "Program 36 · Таймер выравнивания, min"
    min: 0
    max: 900
    step: 1
    mode: box
    initial: 180
  anenji_cfg_program_37_equalization_interval_days:
    name: "Program 37 · Интервал выравнивания, days"
    min: 1
    max: 90
    step: 1
    mode: box
    initial: 30
  anenji_cfg_program_43_soc_back_to_utility:
    name: "Program 43 · SOC перехода на сеть, %"
    min: 20
    max: 50
    step: 1
    mode: box
    initial: 50
  anenji_cfg_program_44_soc_back_to_battery:
    name: "Program 44 · SOC возврата на батарею, %"
    min: 60
    max: 100
    step: 1
    mode: box
    initial: 95
  anenji_cfg_program_45_low_dc_cutoff_soc:
    name: "Program 45 · Нижний порог отключения по SOC, %"
    min: 3
    max: 30
    step: 1
    mode: box
    initial: 20
  anenji_cfg_program_25_modbus_id:
    name: "Program 25 · Modbus ID"
    min: 1
    max: 247
    step: 1
    mode: box
    initial: 1

input_text:
  anenji_cfg_profile_name:
    name: "Профиль конфигурации"
    initial: "default"
    max: 64
  anenji_cfg_snapshot_json:
    name: "Снимок конфигурации (JSON)"
    initial: "{}"
    max: 255
  anenji_cfg_manual_overrides_json:
    name: "Ручные override-параметры (JSON)"
    initial: "{}"
    max: 255
  anenji_cfg_last_published_payload:
    name: "Последний отправленный payload"
    initial: ""
    max: 255
  anenji_cfg_last_received_payload:
    name: "Последний полученный payload"
    initial: ""
    max: 255

script:
  anenji_inverter_sync_config_from_modbus:
    alias: "ANENJI: Синхронизировать параметры из Modbus в helpers"
    mode: restart
    sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.anenji_cfg_sync_from_inverter_active
  anenji_inverter_write_single_config_to_modbus:
    alias: "ANENJI: Записать в Modbus выбранный параметр формы"
    mode: queued
    fields:
      target_entity_id:
        description: "Entity ID helper-параметра для отправки в инвертор"
        example: "input_number.anenji_cfg_program_12_back_to_utility_voltage"
    variables:
      config_map: >-
        {{ {
          'input_select.anenji_cfg_program_01_output_source_priority': {'program': 1, 'address': 301, 'value': {'UTI':0, 'SOL':1, 'SBU':2, 'SUB':3, 'SUF':4}[states('input_select.anenji_cfg_program_01_output_source_priority')]},
          'input_select.anenji_cfg_program_03_input_voltage_range': {'program': 3, 'address': 302, 'value': {'APL':0, 'UPS':1}[states('input_select.anenji_cfg_program_03_input_voltage_range')]},
          'input_boolean.anenji_cfg_program_04_power_saving': {'program': 4, 'address': 307, 'value': 1 if is_state('input_boolean.anenji_cfg_program_04_power_saving', 'on') else 0},
          'input_select.anenji_cfg_program_05_battery_type': {'program': 5, 'address': 322, 'value': {'AGM':0, 'FLd':1, 'USE':2, 'LI2':3, 'LI4':4, 'LIb':5}[states('input_select.anenji_cfg_program_05_battery_type')]},
          'input_boolean.anenji_cfg_program_06_overload_restart': {'program': 6, 'address': 308, 'value': 1 if is_state('input_boolean.anenji_cfg_program_06_overload_restart', 'on') else 0},
          'input_boolean.anenji_cfg_program_07_overtemp_restart': {'program': 7, 'address': 309, 'value': 1 if is_state('input_boolean.anenji_cfg_program_07_overtemp_restart', 'on') else 0},
          'input_select.anenji_cfg_program_08_output_voltage': {'program': 8, 'address': 320, 'value': states('input_select.anenji_cfg_program_08_output_voltage')|replace('V','')|int(230) * 10},
          'input_select.anenji_cfg_program_09_output_frequency': {'program': 9, 'address': 321, 'value': states('input_select.anenji_cfg_program_09_output_frequency')|replace('Hz','')|int(50) * 100},
          'input_select.anenji_cfg_program_10_auto_bypass_mode': {'program': 10, 'address': 338, 'value': {'AnL':0, 'AEO':1}[states('input_select.anenji_cfg_program_10_auto_bypass_mode')]},
          'input_number.anenji_cfg_program_11_max_charge_current': {'program': 11, 'address': 332, 'value': (states('input_number.anenji_cfg_program_11_max_charge_current')|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_12_back_to_utility_voltage': {'program': 12, 'address': 327, 'value': (states('input_number.anenji_cfg_program_12_back_to_utility_voltage')|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_13_back_to_battery_voltage': {'program': 13, 'address': 326, 'value': (states('input_number.anenji_cfg_program_13_back_to_battery_voltage')|float(0) * 10)|round(0)|int},
          'input_select.anenji_cfg_program_16_charge_source_priority': {'program': 16, 'address': 331, 'value': {'CSO':1, 'SNU':2, 'OSO':3}[states('input_select.anenji_cfg_program_16_charge_source_priority')]},
          'input_select.anenji_cfg_program_18_buzzer_mode': {'program': 18, 'address': 303, 'value': {'nd1':0, 'nd2':1, 'nd3':2, 'nd4':3}[states('input_select.anenji_cfg_program_18_buzzer_mode')]},
          'input_select.anenji_cfg_program_19_screen_return_mode': {'program': 19, 'address': 306, 'value': {'bEP':0, 'ESP':1}[states('input_select.anenji_cfg_program_19_screen_return_mode')]},
          'input_select.anenji_cfg_program_20_backlight_mode': {'program': 20, 'address': 305, 'value': {'LOF':0, 'LON':1}[states('input_select.anenji_cfg_program_20_backlight_mode')]},
          'input_select.anenji_cfg_program_23_overload_bypass': {'program': 23, 'address': 310, 'value': {'bYd':0, 'bYE':1}[states('input_select.anenji_cfg_program_23_overload_bypass')]},
          'input_number.anenji_cfg_program_26_bulk_absorption_voltage': {'program': 26, 'address': 324, 'value': (states('input_number.anenji_cfg_program_26_bulk_absorption_voltage')|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_27_float_voltage': {'program': 27, 'address': 325, 'value': (states('input_number.anenji_cfg_program_27_float_voltage')|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_29_low_dc_cutoff_voltage': {'program': 29, 'address': 329, 'value': (states('input_number.anenji_cfg_program_29_low_dc_cutoff_voltage')|float(0) * 10)|round(0)|int},
          'input_select.anenji_cfg_program_32_cv_to_float_time_mode': {'program': 32, 'address': 330, 'value': 0 if states('input_select.anenji_cfg_program_32_cv_to_float_time_mode') == 'AUT' else states('input_select.anenji_cfg_program_32_cv_to_float_time_mode')|int(0)},
          'input_boolean.anenji_cfg_program_33_equalization_enable': {'program': 33, 'address': 313, 'value': 1 if is_state('input_boolean.anenji_cfg_program_33_equalization_enable', 'on') else 0},
          'input_number.anenji_cfg_program_34_equalization_voltage': {'program': 34, 'address': 334, 'value': (states('input_number.anenji_cfg_program_34_equalization_voltage')|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_35_equalization_time': {'program': 35, 'address': 335, 'value': states('input_number.anenji_cfg_program_35_equalization_time')|int(0)},
          'input_number.anenji_cfg_program_36_equalization_timeout': {'program': 36, 'address': 336, 'value': states('input_number.anenji_cfg_program_36_equalization_timeout')|int(0)},
          'input_number.anenji_cfg_program_37_equalization_interval_days': {'program': 37, 'address': 337, 'value': states('input_number.anenji_cfg_program_37_equalization_interval_days')|int(0)},
          'input_boolean.anenji_cfg_program_39_force_equalization': {'program': 39, 'address': 425, 'value': 1 if is_state('input_boolean.anenji_cfg_program_39_force_equalization', 'on') else 0},
          'input_number.anenji_cfg_program_43_soc_back_to_utility': {'program': 43, 'address': 341, 'value': states('input_number.anenji_cfg_program_43_soc_back_to_utility')|int(0)},
          'input_number.anenji_cfg_program_44_soc_back_to_battery': {'program': 44, 'address': 342, 'value': states('input_number.anenji_cfg_program_44_soc_back_to_battery')|int(0)},
          'input_number.anenji_cfg_program_45_low_dc_cutoff_soc': {'program': 45, 'address': 343, 'value': states('input_number.anenji_cfg_program_45_low_dc_cutoff_soc')|int(0)},
          'input_select.anenji_cfg_program_46_overcharge_protection_mode': {'program': 46, 'address': 351, 'value': 0 if states('input_select.anenji_cfg_program_46_overcharge_protection_mode') == 'OFF' else states('input_select.anenji_cfg_program_46_overcharge_protection_mode')|replace('A','')|int(0)}
        } }}
      selected: >-
        {{ config_map.get(target_entity_id) }}
    sequence:
      - condition: template
        value_template: "{{ selected is mapping }}"
      - service: modbus.write_register
        data:
          hub: ANENJI_6200W
          slave: 1
          address: "{{ selected.address }}"
          value: "{{ [selected.value] }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.anenji_cfg_last_published_payload
        data:
          value: >-
            {{
              {
                "source": "manual_apply_single",
                "entity_id": target_entity_id,
                "program": selected.program
              } | tojson
            }}
      - service: script.turn_on
        target:
          entity_id: script.anenji_inverter_sync_config_from_modbus

automation:
  - alias: "ANENJI: Синхронизировать helpers из Modbus при старте и по расписанию"
    id: anenji_sync_config_from_modbus_periodic
    trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: '/5'
    action:
      - service: script.turn_on
        target:
          entity_id: script.anenji_inverter_sync_config_from_modbus

template:
  - sensor:
      - default_entity_id: sensor.anenji_ui_program_01_description
        name: "ANENJI Program 01 Description"
        state: >-
          {% set value = states('input_select.anenji_cfg_program_01_output_source_priority') %}
          {% if value == 'UTI' %}
            UTI — нагрузка питается от сети; если сеть пропадёт, инвертор переключит питание на солнце и АКБ.
          {% elif value == 'SOL' %}
            SOL — нагрузка питается в первую очередь от солнца; при нехватке солнца подключается сеть, АКБ почти не разряжается.
          {% elif value == 'SBU' %}
            SBU — сначала солнце, затем АКБ; сеть подключится только когда батарея разрядится до порога Program 12.
          {% elif value == 'SUB' %}
            SUB — сначала солнце, затем сеть; АКБ используется только если сети нет.
          {% elif value == 'SUF' %}
            SUF — солнце и сеть могут питать нагрузку одновременно; если солнца мало, недостающее берётся из сети, АКБ не участвует.
          {% else %}
            Выберите режим, который определяет, откуда инвертор будет питать нагрузку.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_03_description
        name: "ANENJI Program 03 Description"
        state: >-
          {% set value = states('input_select.anenji_cfg_program_03_input_voltage_range') %}
          {% if value == 'APL' %}
            APL — широкий диапазон входного напряжения для обычной бытовой сети; реже переключается на АКБ при просадках.
          {% elif value == 'UPS' %}
            UPS — узкий диапазон для чувствительной техники; при отклонениях сети быстрее уходит на АКБ.
          {% else %}
            Выберите режим допустимого входного AC-напряжения.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_04_description
        name: "ANENJI Program 04 Description"
        state: >-
          {% if is_state('input_boolean.anenji_cfg_program_04_power_saving', 'on') %}
            Включено — без нагрузки инвертор снижает собственное потребление, но может чуть медленнее реагировать на появление нагрузки.
          {% else %}
            Выключено — выход инвертора постоянно активен, отклик максимальный, собственное потребление выше.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_05_description
        name: "ANENJI Program 05 Description"
        state: >-
          {% set value = states('input_select.anenji_cfg_program_05_battery_type') %}
          {% if value == 'AGM' %}
            AGM — герметичные свинцово-кислотные АКБ; инвертор использует стандартные напряжения для AGM.
          {% elif value == 'FLd' %}
            FLd — затопленный свинцово-кислотный аккумулятор (Flooded).
          {% elif value == 'USE' %}
            USE — пользовательский режим: параметры Program 26, 27 и 29 становятся настраиваемыми вручную.
          {% elif value == 'LI2' %}
            LI2 — поддержка протокола PYLON US2000 3.5 Version.
          {% elif value == 'LI4' %}
            LI4 — стандартный протокол связи с поставщиком преобразователя.
          {% elif value == 'LIb' %}
            LIb — литиевая батарея без связи; напряжения Program 26, 27 и 29 можно задать вручную.
          {% else %}
            Выберите тип АКБ, чтобы инвертор применил корректный алгоритм зарядки.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_06_description
        name: "ANENJI Program 06 Description"
        state: >-
          {% if is_state('input_boolean.anenji_cfg_program_06_overload_restart', 'on') %}
            tYE — разрешён автоматический перезапуск после перегрузки.
          {% else %}
            tYd — автоматический перезапуск после перегрузки отключён.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_07_description
        name: "ANENJI Program 07 Description"
        state: >-
          {% if is_state('input_boolean.anenji_cfg_program_07_overtemp_restart', 'on') %}
            ttE — разрешён автоматический перезапуск после перегрева.
          {% else %}
            ttd — автоматический перезапуск после перегрева отключён.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_08_description
        name: "ANENJI Program 08 Description"
        state: >-
          {% set value = states('input_select.anenji_cfg_program_08_output_voltage') %}
          {{ value }} — уставка выходного напряжения инвертора.
      - default_entity_id: sensor.anenji_ui_program_09_description
        name: "ANENJI Program 09 Description"
        state: >-
          {% set value = states('input_select.anenji_cfg_program_09_output_frequency') %}
          {{ value }} — уставка выходной частоты инвертора.
      - default_entity_id: sensor.anenji_ui_program_10_description
        name: "ANENJI Program 10 Description"
        state: >-
          {% set value = states('input_select.anenji_cfg_program_10_auto_bypass_mode') %}
          {% if value == 'AEO' %}
            AEO — автоматический обход включён: при нормальной сети инвертор автоматически выходит из bypass, даже если выключатель включён.
          {% else %}
            AnL — ручной режим bypass по умолчанию.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_11_description
        name: "ANENJI Program 11 Description"
        state: >-
          Максимальный ток зарядки: {{ states('input_number.anenji_cfg_program_11_max_charge_current')|int(0) }} А. В инструкции указан шаг 2 А и значение по умолчанию 30 А.
      - default_entity_id: sensor.anenji_ui_program_12_description
        name: "ANENJI Program 12 Description"
        state: >-
          Для 48-вольтовой модели при {{ states('input_number.anenji_cfg_program_12_back_to_utility_voltage')|float(0) }} В инвертор вернёт нагрузку на сеть в режимах SBU/SOL. Значение должно быть ниже Program 13.
      - default_entity_id: sensor.anenji_ui_program_13_description
        name: "ANENJI Program 13 Description"
        state: >-
          Для 48-вольтовой модели при {{ states('input_number.anenji_cfg_program_13_back_to_battery_voltage')|float(0) }} В инвертор вернёт питание с сети обратно на батарею/солнце. Значение должно быть выше Program 12.
      - default_entity_id: sensor.anenji_ui_program_16_description
        name: "ANENJI Program 16 Description"
        state: >-
          {% set value = states('input_select.anenji_cfg_program_16_charge_source_priority') %}
          {% if value == 'CSO' %}
            CSO — сначала солнечная энергия; utility заряжает батарею только когда солнечная энергия недоступна.
          {% elif value == 'SNU' %}
            SNU — солнечная энергия и utility могут заряжать батарею одновременно.
          {% elif value == 'OSO' %}
            OSO — батарея заряжается только от солнечных панелей.
          {% else %}
            Выберите приоритет источника зарядки из инструкции.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_18_description
        name: "ANENJI Program 18 Description"
        state: >-
          {% set value = states('input_select.anenji_cfg_program_18_buzzer_mode') %}
          {% if value == 'nd1' %}
            nd1 — приглушение звукового сигнала.
          {% elif value == 'nd2' %}
            nd2 — зуммер звучит при изменении входного источника, предупреждениях и ошибках.
          {% elif value == 'nd3' %}
            nd3 — зуммер звучит только при предупреждениях и ошибках.
          {% elif value == 'nd4' %}
            nd4 — зуммер звучит только при неисправности.
          {% else %}
            Выберите подходящий режим звуковой сигнализации инвертора.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_19_description
        name: "ANENJI Program 19 Description"
        state: >-
          {% if is_state('input_select.anenji_cfg_program_19_screen_return_mode', 'ESP') %}
            ESP — экран автоматически возвращается на главный экран примерно через 1 минуту бездействия.
          {% else %}
            bEP — экран остаётся на последнем экране пользователя до ручного переключения.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_25_description
        name: "ANENJI Program 25 Description"
        state: >-
          Осторожно: Modbus ID влияет на доступность устройства в шине RS485/Modbus. Перед изменением убедитесь, что мастер и все автоматизации будут опрашивать новый адрес. Текущее подготовленное значение: {{ states('input_number.anenji_cfg_program_25_modbus_id')|int(1) }}.
      - default_entity_id: sensor.anenji_ui_program_39_description
        name: "ANENJI Program 39 Description"
        state: >-
          {% if is_state('input_boolean.anenji_cfg_program_39_force_equalization', 'on') %}
            AEn — эквализация будет активирована немедленно, если Program 33 разрешён.
          {% else %}
            Ads — немедленная активация эквализации отключена.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_41_description
        name: "ANENJI Program 41 Description"
        state: >-
          AnL — автоматическая активация литиевой батареи отключена; AtO — если выбран LIx и батарея не обнаружена, инвертор пробует активировать литиевую батарею автоматически один раз. Для записи нужен отдельный подтверждённый регистр прошивки.
      - default_entity_id: sensor.anenji_ui_program_42_description
        name: "ANENJI Program 42 Description"
        state: >-
          nOP — ручная активация литиевой батареи отключена; Act — можно вручную активировать батарею, если в Program 05 выбран LIx. Для записи нужен отдельный подтверждённый регистр прошивки.
      - default_entity_id: sensor.anenji_ui_program_43_description
        name: "ANENJI Program 43 Description"
        state: >-
          При достижении {{ states('input_number.anenji_cfg_program_43_soc_back_to_utility')|int(0) }}% SOC инвертор переводит нагрузку на utility в режимах SBU/SOL. По инструкции допустим диапазон 5%–50%, но значение должно быть больше Program 45.
      - default_entity_id: sensor.anenji_ui_program_44_description
        name: "ANENJI Program 44 Description"
        state: >-
          Когда SOC восстановится до {{ states('input_number.anenji_cfg_program_44_soc_back_to_battery')|int(0) }}%, инвертор сможет вернуться к питанию от батареи/солнца. Диапазон по инструкции: 60%–100%.
      - default_entity_id: sensor.anenji_ui_program_45_description
        name: "ANENJI Program 45 Description"
        state: >-
          При снижении SOC до {{ states('input_number.anenji_cfg_program_45_low_dc_cutoff_soc')|int(0) }}% инвертор отключит разряд по SOC. По инструкции значение должно быть меньше Program 43.
      - default_entity_id: sensor.anenji_ui_program_20_description
        name: "ANENJI Program 20 Description"
        state: >-
          {% set value = states('input_select.anenji_cfg_program_20_backlight_mode') %}
          {% if value == 'LON' %}
            LON — подсветка включена.
          {% elif value == 'LOF' %}
            LOF — подсветка выключена.
          {% else %}
            Выберите режим работы подсветки дисплея.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_23_description
        name: "ANENJI Program 23 Description"
        state: >-
          {% set value = states('input_select.anenji_cfg_program_23_overload_bypass') %}
          {% if value == 'bYE' %}
            bYE — при перегрузке инвертор попробует перевести нагрузку на сеть через bypass.
          {% elif value == 'bYd' %}
            bYd — при перегрузке bypass запрещён, нагрузка будет отключена аварийно.
          {% else %}
            Выберите поведение инвертора при перегрузке.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_26_description
        name: "ANENJI Program 26 Description"
        state: >-
          Если в Program 05 выбран USE, можно задать напряжение C.V. вручную. Для 48 В модели текущая уставка: {{ states('input_number.anenji_cfg_program_26_bulk_absorption_voltage')|float(0) }} В; значение должно быть не ниже Program 27 и используется вместе с Program 29.
      - default_entity_id: sensor.anenji_ui_program_27_description
        name: "ANENJI Program 27 Description"
        state: >-
          Плавающее напряжение зарядки: {{ states('input_number.anenji_cfg_program_27_float_voltage')|float(0) }} В. В режиме USE параметр настраивается вручную и должен быть не выше Program 26.
      - default_entity_id: sensor.anenji_ui_program_29_description
        name: "ANENJI Program 29 Description"
        state: >-
          Низкое напряжение отключения постоянного тока: {{ states('input_number.anenji_cfg_program_29_low_dc_cutoff_voltage')|float(0) }} В. В режиме USE этот порог задаётся вручную и должен быть ниже Program 12.
      - default_entity_id: sensor.anenji_ui_program_32_description
        name: "ANENJI Program 32 Description"
        state: >-
          {% set value = states('input_select.anenji_cfg_program_32_cv_to_float_time_mode') %}
          {% if value == 'AUT' %}
            AUT — время перехода из режима CV в Float инвертор рассчитает автоматически.
          {% else %}
            Через {{ value }} мин после этапа CV инвертор перейдёт в поддерживающий режим Float.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_33_description
        name: "ANENJI Program 33 Description"
        state: >-
          {% if is_state('input_boolean.anenji_cfg_program_33_equalization_enable', 'on') %}
            EEn — выравнивание заряда батареи включено.
          {% else %}
            EdS — выравнивание заряда батареи отключено.
          {% endif %}
      - default_entity_id: sensor.anenji_ui_program_34_description
        name: "ANENJI Program 34 Description"
        state: >-
          Напряжение выравнивания батареи: {{ states('input_number.anenji_cfg_program_34_equalization_voltage')|float(0) }} В. Для 48 В модели шаг настройки 0.1 В, диапазон по инструкции до 64 В.
      - default_entity_id: sensor.anenji_ui_program_35_description
        name: "ANENJI Program 35 Description"
        state: >-
          Время выравнивания заряда батареи: {{ states('input_number.anenji_cfg_program_35_equalization_time')|int(0) }} мин. Диапазон по инструкции 0–900 мин, значение по умолчанию 60 мин.
      - default_entity_id: sensor.anenji_ui_program_36_description
        name: "ANENJI Program 36 Description"
        state: >-
          Тайм-аут выравнивания заряда батареи: {{ states('input_number.anenji_cfg_program_36_equalization_timeout')|int(0) }} мин. Диапазон по инструкции 0–900 мин.
      - default_entity_id: sensor.anenji_ui_program_37_description
        name: "ANENJI Program 37 Description"
        state: >-
          Интервал эквализации: {{ states('input_number.anenji_cfg_program_37_equalization_interval_days')|int(0) }} дн. Диапазон по инструкции 1–90 дней.
      - default_entity_id: sensor.anenji_ui_program_46_description
        name: "ANENJI Program 46 Description"
        state: >-
          {% set value = states('input_select.anenji_cfg_program_46_overcharge_protection_mode') %}
          {% if value == 'OFF' %}
            OFF — защита по максимальному току разряда отключена.
          {% else %}
            {{ value }} — защита ограничивает максимальный ток разряда этим значением. В инструкции отмечено, что функция доступна только для Single-модели.
          {% endif %}