# =========================
# Конфигурация инвертора ANENJI (Program 01..46)
# =========================
# Важно: файл должен содержать только валидный YAML.
input_select:
  anenji_cfg_program_01_output_source_priority:
    name: "Program 01 · Приоритет источника питания"
    options: ["UTI", "SOL", "SBU", "SUF"]
    initial: "SBU"
  anenji_cfg_program_03_input_voltage_range:
    name: "Program 03 · Диапазон входного напряжения"
    options: ["APL", "UPS", "GEN"]
    initial: "UPS"
  anenji_cfg_program_05_battery_type:
    name: "Program 05 · Тип батареи"
    options: ["AGM", "Flooded", "User defined", "LI2", "LI4", "LIB"]
    initial: "AGM"
  anenji_cfg_program_06_charging_priority:
    name: "Program 06 · Приоритет зарядки"
    options: ["Solar first", "Solar + Utility", "Solar only"]
    initial: "Solar first"
  anenji_cfg_program_16_output_frequency_type:
    name: "Program 16 · Тип выходной частоты"
    options: ["50 Hz", "60 Hz"]
    initial: "50 Hz"
  anenji_cfg_program_17_charge_source_priority:
    name: "Program 17 · Приоритет источника зарядки"
    options: ["Solar first", "Solar + Utility", "Utility first", "Solar only"]
    initial: "Solar first"
  anenji_cfg_program_08_output_voltage:
    name: "Program 08 · Выходное напряжение"
    options: ["220V", "230V", "240V"]
    initial: "230V"
  anenji_cfg_program_09_output_frequency:
    name: "Program 09 · Выходная частота"
    options: ["50Hz", "60Hz"]
    initial: "50Hz"
  anenji_cfg_program_10_auto_bypass_mode:
    name: "Program 10 · Автообход (bypass)"
    options: ["AnL", "AEO"]
    initial: "AnL"
  anenji_cfg_program_18_buzzer_mode:
    name: "Program 18 · Режим зуммера"
    options: ["nd1", "nd2", "nd3", "nd4"]
    initial: "nd4"
  anenji_cfg_program_19_screen_return_mode:
    name: "Program 19 · Возврат экрана"
    options: ["CSP", "bEP"]
    initial: "CSP"
  anenji_cfg_program_20_backlight_mode:
    name: "Program 20 · Подсветка"
    options: ["LON", "LOF"]
    initial: "LON"
  anenji_cfg_program_23_overload_bypass:
    name: "Program 23 · Обход при перегрузке"
    options: ["bYd", "bYE"]
    initial: "bYE"
  anenji_cfg_program_32_cv_to_float_time_mode:
    name: "Program 32 · Время заряда (CV→Float)"
    options: ["AUT", "5", "10", "15", "30", "60", "120", "300", "600", "900"]
    initial: "AUT"
  anenji_cfg_program_46_overcharge_protection_mode:
    name: "Program 46 · Защита от макс. тока разряда"
    options: ["OFF", "50A"]
    initial: "OFF"
  anenji_cfg_program_45_bms_mode:
    name: "Program 45 · Режим BMS"
    options: ["Auto", "BMS managed", "Manual override"]
    initial: "Auto"

input_boolean:
  anenji_cfg_sync_from_inverter_active:
    name: "ANENJI · Синхронизация настроек из инвертора"
  anenji_cfg_program_04_power_saving:
    name: "Program 04 · Энергосбережение"
  anenji_cfg_program_07_overload_restart:
    name: "Program 07 · Перезапуск после перегрузки"
  anenji_cfg_program_08_overtemp_restart:
    name: "Program 08 · Перезапуск после перегрева"
  anenji_cfg_program_09_buzzer:
    name: "Program 09 · Звуковой сигнал"
  anenji_cfg_program_10_back_to_grid_auto:
    name: "Program 10 · Автовозврат к сети"
  anenji_cfg_program_33_equalization_enable:
    name: "Program 33 · Выравнивание батареи"
  anenji_cfg_program_39_force_equalization:
    name: "Program 39 · Принудительное выравнивание"
  anenji_cfg_program_44_bms_control_enable:
    name: "Program 44 · Контроль BMS"

input_number:
  anenji_cfg_program_02_max_charge_current:
    name: "Program 02 · Макс. ток зарядки (PV+AC), A"
    min: 0
    max: 90
    step: 1
    mode: box
    initial: 60
  anenji_cfg_program_11_max_ac_charge_current:
    name: "Program 11 · Макс. ток зарядки от сети, A"
    min: 0
    max: 90
    step: 1
    mode: box
    initial: 20
  anenji_cfg_program_12_back_to_utility_voltage:
    name: "Program 12 · Переход на сеть, V"
    min: 44
    max: 57.2
    step: 0.1
    mode: box
    initial: 48
  anenji_cfg_program_13_back_to_battery_voltage:
    name: "Program 13 · Возврат на батарею, V"
    min: 44
    max: 60
    step: 0.1
    mode: box
    initial: 54
  anenji_cfg_program_26_bulk_absorption_voltage:
    name: "Program 26 · Bulk/Absorption, V"
    min: 48
    max: 62
    step: 0.1
    mode: box
    initial: 56.4
  anenji_cfg_program_27_float_voltage:
    name: "Program 27 · Float, V"
    min: 48
    max: 58
    step: 0.1
    mode: box
    initial: 54.0
  anenji_cfg_program_29_low_dc_cutoff_voltage:
    name: "Program 29 · Low DC cut-off, V"
    min: 40
    max: 54
    step: 0.1
    mode: box
    initial: 46.0
  anenji_cfg_program_34_equalization_voltage:
    name: "Program 34 · Напряжение выравнивания, V"
    min: 48
    max: 64
    step: 0.1
    mode: box
    initial: 58.4
  anenji_cfg_program_35_equalization_time:
    name: "Program 35 · Время выравнивания, min"
    min: 0
    max: 900
    step: 1
    mode: box
    initial: 120
  anenji_cfg_program_36_equalization_timeout:
    name: "Program 36 · Таймер выравнивания, min"
    min: 0
    max: 900
    step: 1
    mode: box
    initial: 180
  anenji_cfg_program_37_equalization_interval_days:
    name: "Program 37 · Интервал выравнивания, days"
    min: 1
    max: 90
    step: 1
    mode: box
    initial: 30
  anenji_cfg_program_41_bms_charge_voltage:
    name: "Program 41 · BMS напряжение зарядки, V"
    min: 40
    max: 64
    step: 0.1
    mode: box
    initial: 56.0
  anenji_cfg_program_42_bms_cutoff_voltage:
    name: "Program 42 · BMS напряжение отключения, V"
    min: 40
    max: 64
    step: 0.1
    mode: box
    initial: 44.0
  anenji_cfg_program_43_bms_charge_current:
    name: "Program 43 · BMS ток зарядки, A"
    min: 0
    max: 140
    step: 1
    mode: box
    initial: 60
  anenji_cfg_program_25_modbus_id:
    name: "Program 25 · Modbus ID"
    min: 1
    max: 247
    step: 1
    mode: box
    initial: 1

input_text:
  anenji_cfg_profile_name:
    name: "Профиль конфигурации"
    initial: "default"
    max: 64
  anenji_cfg_snapshot_json:
    name: "Снимок конфигурации (JSON)"
    initial: "{}"
    max: 255
  anenji_cfg_manual_overrides_json:
    name: "Ручные override-параметры (JSON)"
    initial: "{}"
    max: 255
  anenji_cfg_last_published_payload:
    name: "Последний отправленный payload"
    initial: ""
    max: 255
  anenji_cfg_last_received_payload:
    name: "Последний полученный payload"
    initial: ""
    max: 255

script:
  anenji_inverter_sync_config_from_modbus:
    alias: "ANENJI: Синхронизировать параметры из Modbus в helpers"
    mode: restart
    sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.anenji_cfg_sync_from_inverter_active
      - service: input_select.select_option
        target:
          entity_id: input_select.anenji_cfg_program_01_output_source_priority
        data:
          option: >-
            {{ {0:'UTI', 1:'SOL', 2:'SBU', 3:'SUF'}.get(states('sensor.prioritet_vykhoda_output_priority')|int(-1), states('input_select.anenji_cfg_program_01_output_source_priority')) }}
      - service: input_select.select_option
        target:
          entity_id: input_select.anenji_cfg_program_03_input_voltage_range
        data:
          option: >-
            {{ {0:'APL', 1:'UPS', 2:'GEN'}.get(states('sensor.diapazon_vkhodnogo_napriazheniia_input_voltage_range')|int(-1), states('input_select.anenji_cfg_program_03_input_voltage_range')) }}
      - service: "{{ 'input_boolean.turn_on' if states('sensor.energosberezhenie_energy_saving')|int(0) > 0 else 'input_boolean.turn_off' }}"
        target: {entity_id: input_boolean.anenji_cfg_program_04_power_saving}
      - service: input_select.select_option
        target: {entity_id: input_select.anenji_cfg_program_05_battery_type}
        data:
          option: >-
            {{ {0:'AGM', 1:'Flooded', 2:'User defined', 3:'LI2', 4:'LI4', 5:'LIB'}.get(states('sensor.tip_akb_battery_type')|int(-1), states('input_select.anenji_cfg_program_05_battery_type')) }}
      - service: input_select.select_option
        target: {entity_id: input_select.anenji_cfg_program_06_charging_priority}
        data:
          option: >-
            {{ {0:'Solar first', 1:'Solar + Utility', 2:'Solar only'}.get(states('sensor.prioritet_zariadki_battery_charging_priority')|int(-1), states('input_select.anenji_cfg_program_06_charging_priority')) }}
      - service: "{{ 'input_boolean.turn_on' if states('sensor.avtoperezapusk_pri_peregruzke_overload_auto_restart')|int(0) > 0 else 'input_boolean.turn_off' }}"
        target: {entity_id: input_boolean.anenji_cfg_program_07_overload_restart}
      - service: "{{ 'input_boolean.turn_on' if states('sensor.avtoperezapusk_pri_peregreve_overtemp_auto_restart')|int(0) > 0 else 'input_boolean.turn_off' }}"
        target: {entity_id: input_boolean.anenji_cfg_program_08_overtemp_restart}
      - service: "{{ 'input_boolean.turn_on' if states('sensor.zummer_buzzer_mode')|int(0) > 0 else 'input_boolean.turn_off' }}"
        target: {entity_id: input_boolean.anenji_cfg_program_09_buzzer}
      - service: "{{ 'input_boolean.turn_on' if states('sensor.avtovkliuchenie_vykhoda_ot_seti_automatic_mains_output_enable')|int(0) > 0 else 'input_boolean.turn_off' }}"
        target: {entity_id: input_boolean.anenji_cfg_program_10_back_to_grid_auto}
      - service: input_number.set_value
        target: {entity_id: input_number.anenji_cfg_program_02_max_charge_current}
        data: {value: "{{ (states('sensor.maks_tok_zariadki_maximum_charge_current_g')|float(0) * 10)|round(0) / 10 }}"}
      - service: input_number.set_value
        target: {entity_id: input_number.anenji_cfg_program_11_max_ac_charge_current}
        data: {value: "{{ (states('sensor.maks_tok_zariadki_ot_seti_maximum_mains_charge_current_h')|float(0) * 10)|round(0) / 10 }}"}
      - service: input_number.set_value
        target: {entity_id: input_number.anenji_cfg_program_12_back_to_utility_voltage}
        data: {value: "{{ states('sensor.zashchita_nizkogo_napriazheniia_v_seti_mains_low_voltage_protect_e')|float(0) }}"}
      - service: input_number.set_value
        target: {entity_id: input_number.anenji_cfg_program_13_back_to_battery_voltage}
        data: {value: "{{ states('sensor.vosstanovlenie_razriada_v_seti_mains_discharge_recovery_d')|float(0) }}"}
      - service: input_select.select_option
        target: {entity_id: input_select.anenji_cfg_program_08_output_voltage}
        data:
          option: >-
            {{ ('%0.0fV' % (states('sensor.ustavka_vykhodnogo_napriazheniia_output_voltage_set')|float(230))) }}
      - service: input_select.select_option
        target: {entity_id: input_select.anenji_cfg_program_09_output_frequency}
        data:
          option: >-
            {{ ('%0.0fHz' % (states('sensor.ustavka_vykhodnoi_chastoty_output_frequency_set')|float(50))) }}
      - service: input_select.select_option
        target: {entity_id: input_select.anenji_cfg_program_20_backlight_mode}
        data:
          option: >-
            {{ {0:'LOF', 1:'LON'}.get(states('sensor.podsvetka_lcd_lcd_backlight')|int(-1), states('input_select.anenji_cfg_program_20_backlight_mode')) }}
      - service: input_select.select_option
        target: {entity_id: input_select.anenji_cfg_program_23_overload_bypass}
        data:
          option: >-
            {{ {0:'bYd', 1:'bYE'}.get(states('sensor.bypass_pri_peregruzke_overload_bypass_enable')|int(-1), states('input_select.anenji_cfg_program_23_overload_bypass')) }}
      - service: input_number.set_value
        target: {entity_id: input_number.anenji_cfg_program_26_bulk_absorption_voltage}
        data: {value: "{{ states('sensor.maks_napriazhenie_zariadki_maximum_charge_voltage_b')|float(0) }}"}
      - service: input_number.set_value
        target: {entity_id: input_number.anenji_cfg_program_27_float_voltage}
        data: {value: "{{ states('sensor.napriazhenie_float_floating_charge_voltage_c')|float(0) }}"}
      - service: input_select.select_option
        target: {entity_id: input_select.anenji_cfg_program_32_cv_to_float_time_mode}
        data:
          option: >-
            {% set value = states('sensor.perekhod_cv_float_cv_to_float_time')|int(-1) %}
            {{ 'AUT' if value == 0 else value|string if value in [5,10,15,30,60,120,300,600,900] else states('input_select.anenji_cfg_program_32_cv_to_float_time_mode') }}
      - service: "{{ 'input_boolean.turn_on' if states('sensor.vyravnivanie_akb_battery_eq_enable')|int(0) > 0 else 'input_boolean.turn_off' }}"
        target: {entity_id: input_boolean.anenji_cfg_program_33_equalization_enable}
      - service: input_number.set_value
        target: {entity_id: input_number.anenji_cfg_program_34_equalization_voltage}
        data: {value: "{{ states('sensor.napriazhenie_eq_eq_charge_voltage')|float(0) }}"}
      - service: input_number.set_value
        target: {entity_id: input_number.anenji_cfg_program_35_equalization_time}
        data: {value: "{{ states('sensor.vremia_eq_bat_eq_time')|int(0) }}"}
      - service: input_number.set_value
        target: {entity_id: input_number.anenji_cfg_program_36_equalization_timeout}
        data: {value: "{{ states('sensor.taimaut_eq_eq_timed_out')|int(0) }}"}
      - service: input_number.set_value
        target: {entity_id: input_number.anenji_cfg_program_37_equalization_interval_days}
        data: {value: "{{ states('sensor.interval_eq_two_time_eq_interval')|int(0) }}"}
      - service: input_select.select_option
        target: {entity_id: input_select.anenji_cfg_program_46_overcharge_protection_mode}
        data:
          option: >-
            {% set value = states('sensor.zashchita_maks_toka_razriada_maximum_discharge_current_protect')|int(0) %}
            {{ 'OFF' if value == 0 else value|string ~ 'A' }}
      - delay: '00:00:02'
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.anenji_cfg_sync_from_inverter_active

automation:
  - alias: "ANENJI: Синхронизировать helpers из Modbus при старте и по расписанию"
    id: anenji_sync_config_from_modbus_periodic
    trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: '/5'
    action:
      - service: script.turn_on
        target:
          entity_id: script.anenji_inverter_sync_config_from_modbus

  - alias: "ANENJI: Записать изменённый параметр Program 01 в Modbus"
    id: anenji_write_program_01_modbus
    trigger:
      - platform: state
        entity_id: input_select.anenji_cfg_program_01_output_source_priority
    condition:
      - condition: state
        entity_id: input_boolean.anenji_cfg_sync_from_inverter_active
        state: 'off'
    action:
      - service: modbus.write_register
        data:
          hub: ANENJI_6200W
          slave: 1
          address: 301
          value: "{{ {'UTI':0, 'SOL':1, 'SBU':2, 'SUF':3}[trigger.to_state.state] }}"

  - alias: "ANENJI: Записать изменённые параметры формы в Modbus"
    id: anenji_write_supported_programs_modbus
    mode: queued
    trigger:
      - platform: state
        entity_id:
            - input_select.anenji_cfg_program_03_input_voltage_range
            - input_boolean.anenji_cfg_program_04_power_saving
            - input_select.anenji_cfg_program_05_battery_type
            - input_select.anenji_cfg_program_06_charging_priority
            - input_boolean.anenji_cfg_program_07_overload_restart
            - input_boolean.anenji_cfg_program_08_overtemp_restart
            - input_boolean.anenji_cfg_program_09_buzzer
            - input_boolean.anenji_cfg_program_10_back_to_grid_auto
            - input_number.anenji_cfg_program_02_max_charge_current
            - input_number.anenji_cfg_program_11_max_ac_charge_current
            - input_number.anenji_cfg_program_12_back_to_utility_voltage
            - input_number.anenji_cfg_program_13_back_to_battery_voltage
            - input_select.anenji_cfg_program_08_output_voltage
            - input_select.anenji_cfg_program_09_output_frequency
            - input_select.anenji_cfg_program_20_backlight_mode
            - input_select.anenji_cfg_program_23_overload_bypass
            - input_number.anenji_cfg_program_26_bulk_absorption_voltage
            - input_number.anenji_cfg_program_27_float_voltage
            - input_select.anenji_cfg_program_32_cv_to_float_time_mode
            - input_boolean.anenji_cfg_program_33_equalization_enable
            - input_number.anenji_cfg_program_34_equalization_voltage
            - input_number.anenji_cfg_program_35_equalization_time
            - input_number.anenji_cfg_program_36_equalization_timeout
            - input_number.anenji_cfg_program_37_equalization_interval_days
            - input_select.anenji_cfg_program_46_overcharge_protection_mode
    condition:
      - condition: state
        entity_id: input_boolean.anenji_cfg_sync_from_inverter_active
        state: 'off'
    variables:
      map: >-
        {{ {
          'input_select.anenji_cfg_program_03_input_voltage_range': {'address': 302, 'value': {'APL':0, 'UPS':1, 'GEN':2}[trigger.to_state.state]},
          'input_boolean.anenji_cfg_program_04_power_saving': {'address': 307, 'value': 1 if trigger.to_state.state == 'on' else 0},
          'input_select.anenji_cfg_program_05_battery_type': {'address': 322, 'value': {'AGM':0, 'Flooded':1, 'User defined':2, 'LI2':3, 'LI4':4, 'LIB':5}[trigger.to_state.state]},
          'input_select.anenji_cfg_program_06_charging_priority': {'address': 331, 'value': {'Solar first':0, 'Solar + Utility':1, 'Solar only':2}[trigger.to_state.state]},
          'input_boolean.anenji_cfg_program_07_overload_restart': {'address': 308, 'value': 1 if trigger.to_state.state == 'on' else 0},
          'input_boolean.anenji_cfg_program_08_overtemp_restart': {'address': 309, 'value': 1 if trigger.to_state.state == 'on' else 0},
          'input_boolean.anenji_cfg_program_09_buzzer': {'address': 303, 'value': 1 if trigger.to_state.state == 'on' else 0},
          'input_boolean.anenji_cfg_program_10_back_to_grid_auto': {'address': 338, 'value': 1 if trigger.to_state.state == 'on' else 0},
          'input_number.anenji_cfg_program_02_max_charge_current': {'address': 332, 'value': (trigger.to_state.state|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_11_max_ac_charge_current': {'address': 333, 'value': (trigger.to_state.state|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_12_back_to_utility_voltage': {'address': 327, 'value': (trigger.to_state.state|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_13_back_to_battery_voltage': {'address': 326, 'value': (trigger.to_state.state|float(0) * 10)|round(0)|int},
          'input_select.anenji_cfg_program_08_output_voltage': {'address': 320, 'value': trigger.to_state.state|replace('V','')|int(230) * 10},
          'input_select.anenji_cfg_program_09_output_frequency': {'address': 321, 'value': trigger.to_state.state|replace('Hz','')|int(50) * 100},
          'input_select.anenji_cfg_program_20_backlight_mode': {'address': 305, 'value': {'LOF':0, 'LON':1}[trigger.to_state.state]},
          'input_select.anenji_cfg_program_23_overload_bypass': {'address': 310, 'value': {'bYd':0, 'bYE':1}[trigger.to_state.state]},
          'input_number.anenji_cfg_program_26_bulk_absorption_voltage': {'address': 324, 'value': (trigger.to_state.state|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_27_float_voltage': {'address': 325, 'value': (trigger.to_state.state|float(0) * 10)|round(0)|int},
          'input_select.anenji_cfg_program_32_cv_to_float_time_mode': {'address': 330, 'value': 0 if trigger.to_state.state == 'AUT' else trigger.to_state.state|int(0)},
          'input_boolean.anenji_cfg_program_33_equalization_enable': {'address': 313, 'value': 1 if trigger.to_state.state == 'on' else 0},
          'input_number.anenji_cfg_program_34_equalization_voltage': {'address': 334, 'value': (trigger.to_state.state|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_35_equalization_time': {'address': 335, 'value': trigger.to_state.state|int(0)},
          'input_number.anenji_cfg_program_36_equalization_timeout': {'address': 336, 'value': trigger.to_state.state|int(0)},
          'input_number.anenji_cfg_program_37_equalization_interval_days': {'address': 337, 'value': trigger.to_state.state|int(0)},
          'input_select.anenji_cfg_program_46_overcharge_protection_mode': {'address': 351, 'value': 0 if trigger.to_state.state == 'OFF' else trigger.to_state.state|replace('A','')|int(0)}
        }[trigger.entity_id] }}
    action:
      - service: modbus.write_register
        data:
          hub: ANENJI_6200W
          slave: 1
          address: "{{ map.address }}"
          value: "{{ map.value }}"