- id: '1770485914812'
  alias: '!!! Охрана - датчики Душевая/Коридор + присутствие дома'
  description: >-
    Объединённая автоматизация вместо "1 - Определение присутствия дома" и
    "!!! Сообщение - датчик Коридор": постановка/снятие охраны с Wall Tablet,
    обновление статуса присутствия и повторные уведомления по датчикам
    Душевой/Коридора, пока охрана не деактивирована.
  triggers:
  - trigger: state
    entity_id: input_boolean.wall_tablet_guard_mode
    to: 'on'
    id: guard_on
  - trigger: state
    entity_id: input_boolean.wall_tablet_guard_mode
    to: 'off'
    id: guard_off
  - trigger: state
    entity_id: binary_sensor.0xa4c138f7e37d6f18_presence
    to: 'on'
    id: shower_motion
  - trigger: state
    entity_id: binary_sensor.0xa4c138a30a8c8616_presence
    to: 'on'
    id: corridor_motion
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: guard_on
      sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.prisutstvie_doma
        data:
          value: Нет дома
      - service: notify.notify
        data:
          message: '🛡️ Охрана включена на Wall Tablet.'
    - conditions:
      - condition: trigger
        id: guard_off
      sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.prisutstvie_doma
        data:
          value: Дома
      - service: notify.notify
        data:
          message: '✅ Охрана выключена на Wall Tablet.'
    - conditions:
      - condition: template
        value_template: "{{ trigger.id in ['shower_motion', 'corridor_motion'] }}"
      - condition: state
        entity_id: input_boolean.wall_tablet_guard_mode
        state: 'on'
      sequence:
      - variables:
          sensor_name: >-
            {% if trigger.id == 'shower_motion' %}
              Душевая
            {% else %}
              Коридор
            {% endif %}
      - service: notify.notify
        data:
          message: "🚨 Охрана: сработал датчик {{ sensor_name }}."
      - repeat:
          while:
          - condition: state
            entity_id: input_boolean.wall_tablet_guard_mode
            state: 'on'
          - condition: template
            value_template: "{{ is_state(trigger.entity_id, 'on') }}"
          sequence:
          - delay: '00:02:00'
          - condition: state
            entity_id: input_boolean.wall_tablet_guard_mode
            state: 'on'
          - condition: template
            value_template: "{{ is_state(trigger.entity_id, 'on') }}"
          - service: notify.notify
            data:
              message: "🚨 Охрана активна: датчик {{ sensor_name }} всё ещё в тревоге."
  mode: parallel
  max: 10
