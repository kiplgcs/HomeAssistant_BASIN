                    tap_action:
                      action: call-service
                      service: script.turn_on
                      data:
                        variables:
                          target_entity_id: input_select.anenji_cfg_program_05_battery_type
                      target:
                        entity_id: script.anenji_inverter_write_single_config_to_modbus
              - type: horizontal-stack
                cards:
                  - type: entities
                    show_header_toggle: false
                    entities:
                      - entity: input_select.anenji_cfg_program_06_charging_priority
