# =========================
# Конфигурация инвертора ANENJI (Program 01..46)
# =========================
# Важно: файл должен содержать только валидный YAML.
input_select:
  anenji_cfg_program_01_output_source_priority:
    name: "Program 01 · Приоритет источника питания"
    options: ["UTI", "SOL", "SBU", "SUF"]
    initial: "SBU"
  anenji_cfg_program_03_input_voltage_range:
    name: "Program 03 · Диапазон входного напряжения"
    options: ["APL", "UPS", "GEN"]
    initial: "UPS"
  anenji_cfg_program_05_battery_type:
    name: "Program 05 · Тип батареи"
    options: ["AGM", "Flooded", "User defined", "LI2", "LI4", "LIB"]
    initial: "AGM"
  anenji_cfg_program_06_charging_priority:
    name: "Program 06 · Приоритет зарядки"
    options: ["Solar first", "Solar + Utility", "Solar only"]
    initial: "Solar first"
  anenji_cfg_program_16_output_frequency_type:
    name: "Program 16 · Тип выходной частоты"
    options: ["50 Hz", "60 Hz"]
    initial: "50 Hz"
  anenji_cfg_program_17_charge_source_priority:
    name: "Program 17 · Приоритет источника зарядки"
    options: ["Solar first", "Solar + Utility", "Utility first", "Solar only"]
    initial: "Solar first"
  anenji_cfg_program_08_output_voltage:
    name: "Program 08 · Выходное напряжение"
    options: ["220V", "230V", "240V"]
    initial: "230V"
  anenji_cfg_program_09_output_frequency:
    name: "Program 09 · Выходная частота"
    options: ["50Hz", "60Hz"]
    initial: "50Hz"
  anenji_cfg_program_10_auto_bypass_mode:
    name: "Program 10 · Автообход (bypass)"
    options: ["AnL", "AEO"]
    initial: "AnL"
  anenji_cfg_program_18_buzzer_mode:
    name: "Program 18 · Режим зуммера"
    options: ["nd1", "nd2", "nd3", "nd4"]
    initial: "nd4"
  anenji_cfg_program_19_screen_return_mode:
    name: "Program 19 · Возврат экрана"
    options: ["CSP", "bEP"]
    initial: "CSP"
  anenji_cfg_program_20_backlight_mode:
    name: "Program 20 · Подсветка"
    options: ["LON", "LOF"]
    initial: "LON"
  anenji_cfg_program_23_overload_bypass:
    name: "Program 23 · Обход при перегрузке"
    options: ["bYd", "bYE"]
    initial: "bYE"
  anenji_cfg_program_32_cv_to_float_time_mode:
    name: "Program 32 · Время заряда (CV→Float)"
    options: ["AUT", "5", "10", "15", "30", "60", "120", "300", "600", "900"]
    initial: "AUT"
  anenji_cfg_program_46_overcharge_protection_mode:
    name: "Program 46 · Защита от макс. тока разряда"
    options: ["OFF", "50A"]
    initial: "OFF"
  anenji_cfg_program_45_bms_mode:
    name: "Program 45 · Режим BMS"
    options: ["Auto", "BMS managed", "Manual override"]
    initial: "Auto"

input_boolean:
  anenji_cfg_program_04_power_saving:
    name: "Program 04 · Энергосбережение"
  anenji_cfg_program_07_overload_restart:
    name: "Program 07 · Перезапуск после перегрузки"
  anenji_cfg_program_08_overtemp_restart:
    name: "Program 08 · Перезапуск после перегрева"
  anenji_cfg_program_09_buzzer:
    name: "Program 09 · Звуковой сигнал"
  anenji_cfg_program_10_back_to_grid_auto:
    name: "Program 10 · Автовозврат к сети"
  anenji_cfg_program_33_equalization_enable:
    name: "Program 33 · Выравнивание батареи"
  anenji_cfg_program_39_force_equalization:
    name: "Program 39 · Принудительное выравнивание"
  anenji_cfg_program_44_bms_control_enable:
    name: "Program 44 · Контроль BMS"

input_number:
  anenji_cfg_program_02_max_charge_current:
    name: "Program 02 · Макс. ток зарядки (PV+AC), A"
    min: 0
    max: 90
    step: 1
    mode: box
    initial: 60
  anenji_cfg_program_11_max_ac_charge_current:
    name: "Program 11 · Макс. ток зарядки от сети, A"
    min: 0
    max: 90
    step: 1
    mode: box
    initial: 20
  anenji_cfg_program_12_back_to_utility_voltage:
    name: "Program 12 · Переход на сеть, V"
    min: 44
    max: 57.2
    step: 0.1
    mode: box
    initial: 48
  anenji_cfg_program_13_back_to_battery_voltage:
    name: "Program 13 · Возврат на батарею, V"
    min: 44
    max: 60
    step: 0.1
    mode: box
    initial: 54
  anenji_cfg_program_26_bulk_absorption_voltage:
    name: "Program 26 · Bulk/Absorption, V"
    min: 48
    max: 62
    step: 0.1
    mode: box
    initial: 56.4
  anenji_cfg_program_27_float_voltage:
    name: "Program 27 · Float, V"
    min: 48
    max: 58
    step: 0.1
    mode: box
    initial: 54.0
  anenji_cfg_program_29_low_dc_cutoff_voltage:
    name: "Program 29 · Low DC cut-off, V"
    min: 40
    max: 54
    step: 0.1
    mode: box
    initial: 46.0
  anenji_cfg_program_34_equalization_voltage:
    name: "Program 34 · Напряжение выравнивания, V"
    min: 48
    max: 64
    step: 0.1
    mode: box
    initial: 58.4
  anenji_cfg_program_35_equalization_time:
    name: "Program 35 · Время выравнивания, min"
    min: 0
    max: 900
    step: 1
    mode: box
    initial: 120
  anenji_cfg_program_36_equalization_timeout:
    name: "Program 36 · Таймер выравнивания, min"
    min: 0
    max: 900
    step: 1
    mode: box
    initial: 180
  anenji_cfg_program_37_equalization_interval_days:
    name: "Program 37 · Интервал выравнивания, days"
    min: 1
    max: 90
    step: 1
    mode: box
    initial: 30
  anenji_cfg_program_41_bms_charge_voltage:
    name: "Program 41 · BMS напряжение зарядки, V"
    min: 40
    max: 64
    step: 0.1
    mode: box
    initial: 56.0
  anenji_cfg_program_42_bms_cutoff_voltage:
    name: "Program 42 · BMS напряжение отключения, V"
    min: 40
    max: 64
    step: 0.1
    mode: box
    initial: 44.0
  anenji_cfg_program_43_bms_charge_current:
    name: "Program 43 · BMS ток зарядки, A"
    min: 0
    max: 140
    step: 1
    mode: box
    initial: 60
  anenji_cfg_program_25_modbus_id:
    name: "Program 25 · Modbus ID"
    min: 1
    max: 247
    step: 1
    mode: box
    initial: 1

input_text:
  anenji_cfg_profile_name:
    name: "Профиль конфигурации"
    initial: "default"
    max: 64
  anenji_cfg_snapshot_json:
    name: "Снимок конфигурации (JSON)"
    initial: "{}"
    max: 255
  anenji_cfg_manual_overrides_json:
    name: "Ручные override-параметры (JSON)"
    initial: "{}"
    max: 255
  anenji_cfg_last_published_payload:
    name: "Последний отправленный payload"
    initial: ""
    max: 255
  anenji_cfg_last_received_payload:
    name: "Последний полученный payload"
    initial: ""
    max: 255

script:
  anenji_inverter_publish_config:
    alias: "ANENJI: Отправить конфигурацию инвертора в MQTT"
    sequence:
      - variables:
          payload_json: >-
            {% set base = {
              "profile": states('input_text.anenji_cfg_profile_name'),
              "program_01": states('input_select.anenji_cfg_program_01_output_source_priority'),
              "program_02": states('input_number.anenji_cfg_program_02_max_charge_current') | float,
              "program_03": states('input_select.anenji_cfg_program_03_input_voltage_range'),
              "program_04": is_state('input_boolean.anenji_cfg_program_04_power_saving','on'),
              "program_05": states('input_select.anenji_cfg_program_05_battery_type'),
              "program_06": states('input_select.anenji_cfg_program_06_charging_priority'),
              "program_07": is_state('input_boolean.anenji_cfg_program_07_overload_restart','on'),
              "program_08": is_state('input_boolean.anenji_cfg_program_08_overtemp_restart','on'),
              "program_08_voltage": states('input_select.anenji_cfg_program_08_output_voltage'),
              "program_09": is_state('input_boolean.anenji_cfg_program_09_buzzer','on'),
              "program_09_frequency": states('input_select.anenji_cfg_program_09_output_frequency'),
              "program_10": is_state('input_boolean.anenji_cfg_program_10_back_to_grid_auto','on'),
              "program_10_bypass": states('input_select.anenji_cfg_program_10_auto_bypass_mode'),
              "program_11": states('input_number.anenji_cfg_program_11_max_ac_charge_current') | float,
              "program_12": states('input_number.anenji_cfg_program_12_back_to_utility_voltage') | float,
              "program_13": states('input_number.anenji_cfg_program_13_back_to_battery_voltage') | float,
              "program_16": states('input_select.anenji_cfg_program_16_output_frequency_type'),
              "program_17": states('input_select.anenji_cfg_program_17_charge_source_priority'),
              "program_18": states('input_select.anenji_cfg_program_18_buzzer_mode'),
              "program_19": states('input_select.anenji_cfg_program_19_screen_return_mode'),
              "program_20": states('input_select.anenji_cfg_program_20_backlight_mode'),
              "program_23": states('input_select.anenji_cfg_program_23_overload_bypass'),
              "program_25": states('input_number.anenji_cfg_program_25_modbus_id') | int,
              "program_26": states('input_number.anenji_cfg_program_26_bulk_absorption_voltage') | float,
              "program_27": states('input_number.anenji_cfg_program_27_float_voltage') | float,
              "program_29": states('input_number.anenji_cfg_program_29_low_dc_cutoff_voltage') | float,
              "program_32": states('input_select.anenji_cfg_program_32_cv_to_float_time_mode'),
              "program_33": is_state('input_boolean.anenji_cfg_program_33_equalization_enable','on'),
              "program_34": states('input_number.anenji_cfg_program_34_equalization_voltage') | float,
              "program_35": states('input_number.anenji_cfg_program_35_equalization_time') | int,
              "program_36": states('input_number.anenji_cfg_program_36_equalization_timeout') | int,
              "program_37": states('input_number.anenji_cfg_program_37_equalization_interval_days') | int,
              "program_39": is_state('input_boolean.anenji_cfg_program_39_force_equalization','on'),
              "program_41": states('input_number.anenji_cfg_program_41_bms_charge_voltage') | float,
              "program_42": states('input_number.anenji_cfg_program_42_bms_cutoff_voltage') | float,
              "program_43": states('input_number.anenji_cfg_program_43_bms_charge_current') | float,
              "program_44": is_state('input_boolean.anenji_cfg_program_44_bms_control_enable','on'),
              "program_45": states('input_select.anenji_cfg_program_45_bms_mode'),
              "program_46": states('input_select.anenji_cfg_program_46_overcharge_protection_mode')
            } %}
            {% set overrides_raw = states('input_text.anenji_cfg_manual_overrides_json') %}
            {% set overrides = overrides_raw | from_json if overrides_raw not in ['', 'unknown', 'unavailable'] else {} %}
            {% set merged = base | combine(overrides, recursive=True) %}
            {{ ({"profile": states('input_text.anenji_cfg_profile_name'), "config": merged} | combine(merged, recursive=True)) | tojson }}
      - service: mqtt.publish
        data:
          qos: 1
          retain: true
          topic: anenji/inverter/config/set
          payload: "{{ payload_json }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.anenji_cfg_last_published_payload
        data:
          value: "{{ payload_json[:255] }}"
      - service: persistent_notification.create
        data:
          title: "ANENJI MQTT"
          message: >-
            Конфигурация опубликована (retained) в MQTT topic
            <code>anenji/inverter/config/set</code>.
            Для проверки обратной синхронизации запустите
            <code>script.anenji_inverter_request_config</code>.

  anenji_inverter_save_config_snapshot:
    alias: "ANENJI: Сохранить текущую форму в JSON"
    sequence:
      - service: input_text.set_value
        target:
          entity_id: input_text.anenji_cfg_snapshot_json
        data:
          value: >-
            {% set base = {
              "profile": states('input_text.anenji_cfg_profile_name'),
              "program_01": states('input_select.anenji_cfg_program_01_output_source_priority'),
              "program_02": states('input_number.anenji_cfg_program_02_max_charge_current') | float,
              "program_03": states('input_select.anenji_cfg_program_03_input_voltage_range'),
              "program_04": is_state('input_boolean.anenji_cfg_program_04_power_saving','on'),
              "program_05": states('input_select.anenji_cfg_program_05_battery_type'),
              "program_06": states('input_select.anenji_cfg_program_06_charging_priority'),
              "program_07": is_state('input_boolean.anenji_cfg_program_07_overload_restart','on'),
              "program_08": is_state('input_boolean.anenji_cfg_program_08_overtemp_restart','on'),
              "program_08_voltage": states('input_select.anenji_cfg_program_08_output_voltage'),
              "program_09": is_state('input_boolean.anenji_cfg_program_09_buzzer','on'),
              "program_09_frequency": states('input_select.anenji_cfg_program_09_output_frequency'),
              "program_10": is_state('input_boolean.anenji_cfg_program_10_back_to_grid_auto','on'),
              "program_10_bypass": states('input_select.anenji_cfg_program_10_auto_bypass_mode'),
              "program_11": states('input_number.anenji_cfg_program_11_max_ac_charge_current') | float,
              "program_12": states('input_number.anenji_cfg_program_12_back_to_utility_voltage') | float,
              "program_13": states('input_number.anenji_cfg_program_13_back_to_battery_voltage') | float,
              "program_16": states('input_select.anenji_cfg_program_16_output_frequency_type'),
              "program_17": states('input_select.anenji_cfg_program_17_charge_source_priority'),
              "program_18": states('input_select.anenji_cfg_program_18_buzzer_mode'),
              "program_19": states('input_select.anenji_cfg_program_19_screen_return_mode'),
              "program_20": states('input_select.anenji_cfg_program_20_backlight_mode'),
              "program_23": states('input_select.anenji_cfg_program_23_overload_bypass'),
              "program_25": states('input_number.anenji_cfg_program_25_modbus_id') | int,
              "program_26": states('input_number.anenji_cfg_program_26_bulk_absorption_voltage') | float,
              "program_27": states('input_number.anenji_cfg_program_27_float_voltage') | float,
              "program_29": states('input_number.anenji_cfg_program_29_low_dc_cutoff_voltage') | float,
              "program_32": states('input_select.anenji_cfg_program_32_cv_to_float_time_mode'),
              "program_33": is_state('input_boolean.anenji_cfg_program_33_equalization_enable','on'),
              "program_34": states('input_number.anenji_cfg_program_34_equalization_voltage') | float,
              "program_35": states('input_number.anenji_cfg_program_35_equalization_time') | int,
              "program_36": states('input_number.anenji_cfg_program_36_equalization_timeout') | int,
              "program_37": states('input_number.anenji_cfg_program_37_equalization_interval_days') | int,
              "program_39": is_state('input_boolean.anenji_cfg_program_39_force_equalization','on'),
              "program_41": states('input_number.anenji_cfg_program_41_bms_charge_voltage') | float,
              "program_42": states('input_number.anenji_cfg_program_42_bms_cutoff_voltage') | float,
              "program_43": states('input_number.anenji_cfg_program_43_bms_charge_current') | float,
              "program_44": is_state('input_boolean.anenji_cfg_program_44_bms_control_enable','on'),
              "program_45": states('input_select.anenji_cfg_program_45_bms_mode'),
              "program_46": states('input_select.anenji_cfg_program_46_overcharge_protection_mode')
            } %}
            {% set overrides_raw = states('input_text.anenji_cfg_manual_overrides_json') %}
            {% set overrides = overrides_raw | from_json if overrides_raw not in ['', 'unknown', 'unavailable'] else {} %}
            {{ base | combine(overrides, recursive=True) | tojson }}

  anenji_inverter_request_config:
    alias: "ANENJI: Запросить актуальную конфигурацию из инвертора"
    sequence:
      - service: mqtt.publish
        data:
          qos: 1
          topic: anenji/inverter/config/get
          payload: >-
            {{ {"profile": states('input_text.anenji_cfg_profile_name')} | tojson }}

automation:
  - alias: "ANENJI: Запрашивать актуальную конфигурацию при старте и по расписанию"
    id: anenji_request_config_periodic
    trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/15"
    action:
      - service: script.turn_on
        target:
          entity_id: script.anenji_inverter_request_config

  - alias: "ANENJI: Применить актуальную конфигурацию из MQTT"
    id: anenji_apply_config_from_mqtt
    trigger:
      - platform: mqtt
        topic: anenji/inverter/config/state
      - platform: mqtt
        topic: anenji/inverter/config/actual
    variables:
      payload_obj: "{{ trigger.payload_json if trigger.payload_json is mapping else {} }}"
      cfg: "{{ payload_obj.config if payload_obj.config is defined and payload_obj.config is mapping else (payload_obj.settings if payload_obj.settings is defined and payload_obj.settings is mapping else (payload_obj.payload if payload_obj.payload is defined and payload_obj.payload is mapping else (payload_obj.data if payload_obj.data is defined and payload_obj.data is mapping else payload_obj))) }}"
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.anenji_cfg_last_received_payload
        data:
          value: "{{ trigger.payload[:255] }}"
      - choose:
          - conditions: "{{ cfg.program_01 is defined }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.anenji_cfg_program_01_output_source_priority
                data:
                  option: "{{ cfg.program_01 }}"
      - choose:
          - conditions: "{{ cfg.program_02 is defined }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.anenji_cfg_program_02_max_charge_current
                data:
                  value: "{{ cfg.program_02 | float }}"
      - choose:
          - conditions: "{{ cfg.program_03 is defined }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.anenji_cfg_program_03_input_voltage_range
                data:
                  option: "{{ cfg.program_03 }}"
      - choose:
          - conditions: "{{ cfg.program_04 is defined }}"
            sequence:
              - service: "{{ 'input_boolean.turn_on' if cfg.program_04 else 'input_boolean.turn_off' }}"
                target:
                  entity_id: input_boolean.anenji_cfg_program_04_power_saving
      - choose:
          - conditions: "{{ cfg.program_05 is defined }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.anenji_cfg_program_05_battery_type
                data:
                  option: "{{ cfg.program_05 }}"
      - choose:
          - conditions: "{{ cfg.program_06 is defined }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.anenji_cfg_program_06_charging_priority
                data:
                  option: "{{ cfg.program_06 }}"
      - choose:
          - conditions: "{{ cfg.program_07 is defined }}"
            sequence:
              - service: "{{ 'input_boolean.turn_on' if cfg.program_07 else 'input_boolean.turn_off' }}"
                target:
                  entity_id: input_boolean.anenji_cfg_program_07_overload_restart
      - choose:
          - conditions: "{{ cfg.program_08 is defined }}"
            sequence:
              - service: "{{ 'input_boolean.turn_on' if cfg.program_08 else 'input_boolean.turn_off' }}"
                target:
                  entity_id: input_boolean.anenji_cfg_program_08_overtemp_restart
      - choose:
          - conditions: "{{ cfg.program_08_voltage is defined }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.anenji_cfg_program_08_output_voltage
                data:
                  option: "{{ cfg.program_08_voltage }}"
      - choose:
          - conditions: "{{ cfg.program_09 is defined }}"
            sequence:
              - service: "{{ 'input_boolean.turn_on' if cfg.program_09 else 'input_boolean.turn_off' }}"
                target:
                  entity_id: input_boolean.anenji_cfg_program_09_buzzer
      - choose:
          - conditions: "{{ cfg.program_09_frequency is defined }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.anenji_cfg_program_09_output_frequency
                data:
                  option: "{{ cfg.program_09_frequency }}"
      - choose:
          - conditions: "{{ cfg.program_10 is defined }}"
            sequence:
              - service: "{{ 'input_boolean.turn_on' if cfg.program_10 else 'input_boolean.turn_off' }}"
                target:
                  entity_id: input_boolean.anenji_cfg_program_10_back_to_grid_auto
      - choose:
          - conditions: "{{ cfg.program_10_bypass is defined }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.anenji_cfg_program_10_auto_bypass_mode
                data:
                  option: "{{ cfg.program_10_bypass }}"
      - choose:
          - conditions: "{{ cfg.program_11 is defined }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.anenji_cfg_program_11_max_ac_charge_current
                data:
                  value: "{{ cfg.program_11 | float }}"
      - choose:
          - conditions: "{{ cfg.program_12 is defined }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.anenji_cfg_program_12_back_to_utility_voltage
                data:
                  value: "{{ cfg.program_12 | float }}"
      - choose:
          - conditions: "{{ cfg.program_13 is defined }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.anenji_cfg_program_13_back_to_battery_voltage
                data:
                  value: "{{ cfg.program_13 | float }}"
      - choose:
          - conditions: "{{ cfg.program_16 is defined }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.anenji_cfg_program_16_output_frequency_type
                data:
                  option: "{{ cfg.program_16 }}"
      - choose:
          - conditions: "{{ cfg.program_17 is defined }}"
            sequence:
