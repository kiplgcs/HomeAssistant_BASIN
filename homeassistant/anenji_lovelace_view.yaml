                name: Текущий нижний порог отключения по SOC (Program 45)
          - type: markdown
            content: >
              Блок логически отделён: если BMS-сущности `charge forbidden` /
              `discharge forbidden` ещё не заведены, здесь оставлены точечные
              TODO без выдумывания `entity_id`.
