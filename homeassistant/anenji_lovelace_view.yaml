                action_name: Отправить
                tap_action:
                  action: call-service
                  service: script.turn_on
                  data:
                    variables:
                      target_entity_id: input_boolean.anenji_cfg_program_04_power_saving
                  target:
                    entity_id: script.anenji_inverter_write_single_config_to_modbus
          - type: entities
            grid_options:
              columns: 6
            title: Program 05
            show_header_toggle: false
            entities:
              - type: section
                label: Тип аккумулятора — влияет на алгоритм зарядки
              - entity: input_select.anenji_cfg_program_05_battery_type
                name: Значение
              - entity: sensor.anenji_program_05_description
