views:
  - title: Инвертор ANENJI
    path: anenji
    icon: mdi:solar-power-variant
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Солнечная электростанция ANENJI 6200 Вт
            heading_style: title
            icon: mdi:solar-power-variant
          - type: markdown
            content: |
              **Сводка состояния**
          - type: grid
            columns: 4
            square: false
            cards:
              - type: tile
                entity: sensor.moshchnost_pv_pv_power
                name: Мощность солнечных панелей
                icon: mdi:solar-power
                color: amber
              - type: tile
                entity: sensor.moshchnost_nagruzki_load_power
                name: Мощность нагрузки
                icon: mdi:home-lightning-bolt
                color: blue
              - type: tile
                entity: sensor.moshchnost_seti_grid_power
                name: Мощность сети
                icon: mdi:transmission-tower
                color: cyan
              - type: tile
                entity: sensor.zariad_akb_battery_soc
                name: Степень заряда аккумулятора
                icon: mdi:battery-high
                color: green
          - type: entities
            title: Потоки энергии и режим работы
            show_header_toggle: false
            entities:
              - entity: sensor.moshchnost_pv_pv_power
                name: Солнечные панели — суммарная мощность
              - entity: sensor.anenji_flow_pv_to_load
                name: Поток от солнечных панелей к нагрузке
              - entity: sensor.anenji_flow_pv_to_battery
                name: Поток от солнечных панелей к аккумулятору
              - type: section
                label: Взаимодействие с сетью
              - entity: sensor.moshchnost_seti_grid_power
                name: Сеть — суммарная мощность
              - entity: sensor.anenji_flow_grid_to_load
                name: Поток от сети к нагрузке
              - entity: sensor.anenji_flow_grid_to_battery
                name: Поток от сети к аккумулятору
              - type: section
                label: Аккумулятор
              - entity: sensor.anenji_flow_battery_power_signed
                name: Аккумулятор — знаковая мощность
              - entity: sensor.anenji_flow_battery_to_load
                name: Поток от аккумулятора к нагрузке
              - entity: sensor.zariad_akb_battery_soc
                name: Степень заряда аккумулятора
              - type: section
                label: Состояние инвертора
              - entity: sensor.rezhim_raboty_working_mode
                name: Режим работы (код)
              - entity: sensor.anenji_working_mode_text
                name: Режим работы (текстовое описание)
              - entity: sensor.potoki_energii_power_flow_status
                name: Состояние потоков энергии (код)
          - type: grid
            columns: 2
            square: false
            cards:
              - type: gauge
                name: Мощность солнечных панелей
                entity: sensor.moshchnost_pv_pv_power
                min: 0
                max: 6200
                unit: Вт
                severity:
                  green: 1
                  yellow: 2500
                  red: 5000
              - type: gauge
                name: Мощность нагрузки
                entity: sensor.moshchnost_nagruzki_load_power
                min: 0
                max: 6200
                unit: Вт
                severity:
                  green: 1
                  yellow: 2500
                  red: 5000
              - type: gauge
                name: Мощность сети
                entity: sensor.moshchnost_seti_grid_power
                min: -6200
                max: 6200
                unit: Вт
              - type: gauge
                name: Мощность аккумулятора
                entity: sensor.anenji_flow_battery_power_signed
                min: -6200
                max: 6200
                unit: Вт
          - type: history-graph
            title: История мощностей за 24 часа
            hours_to_show: 24
            refresh_interval: 30
            entities:
              - entity: sensor.moshchnost_pv_pv_power
                name: Солнечные панели
              - entity: sensor.moshchnost_nagruzki_load_power
                name: Нагрузка
              - entity: sensor.moshchnost_seti_grid_power
                name: Сеть
              - entity: sensor.anenji_flow_battery_power_signed
                name: Аккумулятор
          - type: statistics-graph
            title: Статистика мощности нагрузки (24 часа)
            chart_type: line
            days_to_show: 1
            stat_types:
              - mean
              - max
            entities:
              - sensor.moshchnost_nagruzki_load_power
      - type: grid
        cards:
          - type: heading
            heading: Подробная телеметрия
            icon: mdi:chart-line
          - type: entities
            title: Солнечные панели
            show_header_toggle: false
            entities:
              - entity: sensor.napriazhenie_pv_pv_voltage
                name: Напряжение солнечных панелей
              - entity: sensor.tok_pv_pv_current
                name: Ток солнечных панелей
              - entity: sensor.moshchnost_pv_pv_power
                name: Мощность солнечных панелей
              - entity: sensor.tok_zariadki_ot_pv_pv_charging_current
                name: Ток зарядки от солнечных панелей
              - entity: sensor.moshchnost_zariadki_ot_pv_pv_charging_power
                name: Мощность зарядки от солнечных панелей
          - type: entities
            title: Аккумулятор
            show_header_toggle: false
            entities:
              - entity: sensor.napriazhenie_akb_battery_voltage
                name: Напряжение аккумулятора
              - entity: sensor.tok_akb_battery_current
                name: Ток аккумулятора
              - entity: sensor.tok_akb_znak_battery_current_signed_filtered
                name: Ток аккумулятора (со знаком)
              - entity: sensor.moshchnost_akb_battery_power
                name: Мощность аккумулятора
              - entity: sensor.zariad_akb_battery_soc
                name: Степень заряда аккумулятора
          - type: entities
            title: Сеть и выход
            show_header_toggle: false
            entities:
              - entity: sensor.napriazhenie_seti_grid_voltage
                name: Напряжение сети
              - entity: sensor.chastota_seti_grid_frequency
                name: Частота сети
              - entity: sensor.vykhodnoe_napriazhenie_output_voltage
                name: Выходное напряжение
              - entity: sensor.vykhodnoi_tok_output_current
                name: Выходной ток
              - entity: sensor.vykhodnaia_chastota_output_frequency
                name: Выходная частота
              - entity: sensor.polnaia_moshchnost_nagruzki_load_apparent_power
                name: Полная мощность нагрузки
          - type: entities
            title: Инвертор и температура
            show_header_toggle: false
            entities:
              - entity: sensor.napriazhenie_invertora_inverter_voltage
                name: Напряжение инвертора
              - entity: sensor.tok_invertora_inverter_current
                name: Ток инвертора
              - entity: sensor.moshchnost_invertora_inverter_power
                name: Мощность инвертора
              - entity: >-
                  sensor.moshchnost_zariadki_ot_invertora_inverter_charging_power
                name: Мощность зарядки от инвертора
              - entity: sensor.tok_zariadki_ot_invertora_inverter_charging_current
                name: Ток зарядки от инвертора
              - entity: sensor.temperatura_dc_dc_dcdc_temperature
                name: Температура преобразователя постоянного тока
              - entity: sensor.temperatura_invertora_inverter_temperature
                name: Температура инвертора
          - type: entities
            title: Ошибки и предупреждения
            show_header_toggle: false
            entities:
              - entity: sensor.kod_avarii_bitami_fault_bitmask
                name: Код аварий (битовая маска)
              - entity: sensor.kod_preduprezhdenii_bitami_warning_bitmask_masked
                name: Код предупреждений (битовая маска)
              - entity: sensor.maska_preduprezhdenii_warning_mask_i
                name: Маска предупреждений
          - type: entities
            title: Параметры инвертора
            show_header_toggle: false
            entities:
              - entity: sensor.rezhim_vykhoda_output_mode
                name: Режим выхода
              - entity: sensor.prioritet_vykhoda_output_priority
                name: Приоритет источника питания на выходе
              - entity: sensor.diapazon_vkhodnogo_napriazheniia_input_voltage_range
                name: Диапазон входного напряжения
              - entity: sensor.ustavka_vykhodnogo_napriazheniia_output_voltage_set
                name: Установка выходного напряжения
              - entity: sensor.ustavka_vykhodnoi_chastoty_output_frequency_set
                name: Установка выходной частоты
              - entity: sensor.maks_tok_zariadki_maximum_charge_current_g
                name: Максимальный ток зарядки
              - entity: >-
                  sensor.maks_tok_zariadki_ot_seti_maximum_mains_charge_current_h
                name: Максимальный ток зарядки от сети
              - entity: sensor.udalennyi_vykliuchatel_remote_switch
                name: Удалённый выключатель
      - type: grid
        cards:
          - type: entities
            title: Ключевые параметры (Program 01, 02, 05, 11, 12, 13, 26, 27, 29)
            show_header_toggle: false
            entities:
              - entity: input_select.anenji_cfg_program_01_output_source_priority
              - entity: input_number.anenji_cfg_program_02_max_charge_current
              - entity: input_select.anenji_cfg_program_05_battery_type
              - entity: input_number.anenji_cfg_program_11_max_ac_charge_current
              - entity: input_number.anenji_cfg_program_12_back_to_utility_voltage
              - entity: input_number.anenji_cfg_program_13_back_to_battery_voltage
              - entity: input_number.anenji_cfg_program_26_bulk_absorption_voltage
              - entity: input_number.anenji_cfg_program_27_float_voltage
              - entity: input_number.anenji_cfg_program_29_low_dc_cutoff_voltage
          - type: entities
            title: >-
              Сеть / режимы / автоповедение (Program 03, 04, 06, 07, 08, 09, 10,
              16, 17)
            show_header_toggle: false
            entities:
              - entity: input_select.anenji_cfg_program_03_input_voltage_range
              - entity: input_boolean.anenji_cfg_program_04_power_saving
              - entity: input_select.anenji_cfg_program_06_charging_priority
              - entity: input_boolean.anenji_cfg_program_07_overload_restart
              - entity: input_boolean.anenji_cfg_program_08_overtemp_restart
              - entity: input_boolean.anenji_cfg_program_09_buzzer
              - entity: input_boolean.anenji_cfg_program_10_back_to_grid_auto
              - entity: input_select.anenji_cfg_program_16_output_frequency_type
              - entity: input_select.anenji_cfg_program_17_charge_source_priority
          - type: entities
            title: Выравнивание и BMS (Program 33, 34, 35, 36, 37, 39, 41–45)
            show_header_toggle: false
            entities:
              - entity: input_boolean.anenji_cfg_program_33_equalization_enable
              - entity: input_number.anenji_cfg_program_34_equalization_voltage
              - entity: input_number.anenji_cfg_program_35_equalization_time
              - entity: input_number.anenji_cfg_program_36_equalization_timeout
              - entity: input_number.anenji_cfg_program_37_equalization_interval_days
              - entity: input_boolean.anenji_cfg_program_39_force_equalization
              - entity: input_number.anenji_cfg_program_41_bms_charge_voltage
              - entity: input_number.anenji_cfg_program_42_bms_cutoff_voltage
              - entity: input_number.anenji_cfg_program_43_bms_charge_current
              - entity: input_boolean.anenji_cfg_program_44_bms_control_enable
              - entity: input_select.anenji_cfg_program_45_bms_mode
          - type: entities
            title: Профиль и сохранение конфигурации
            show_header_toggle: false
            entities:
              - entity: input_text.anenji_cfg_profile_name
                name: Имя профиля
              - entity: script.anenji_inverter_save_config_snapshot
                name: Сохранить форму в JSON
              - entity: input_text.anenji_cfg_snapshot_json
                name: JSON-снимок (для экспорта/автоматизаций)
              - entity: script.anenji_inverter_publish_config
                name: Отправить конфигурацию в MQTT
