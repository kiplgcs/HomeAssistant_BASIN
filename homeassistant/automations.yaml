- id: '1774333666055'
  alias: Переключение режима ANJ солнечного инвертора (SOL/SUB с гистерезисом)
  description: 'Автоматизация держит инвертор в SOL при хорошем солнце (в т.ч. по
    weather.openweathermap), учитывает гистерезис и не даёт лишних переходов в SUB.
    Ключевые идеи: 1) SOL включается при стабильной генерации ИЛИ при солнечном прогнозе,
    если PV-напряжение/АКБ позволяют. 2) SUB включается только при устойчиво плохом
    солнце (или большом импорте из сети / перед закатом). 3) Защита от «дребезга»:
    обязательная пауза между переключениями 15 минут + дополнительная проверка перед
    записью. Все подписи и логика специально оставлены на русском для удобства панели.'
  # ------------------------------
  # Настраиваемые условия "солнечной погоды" из OpenWeatherMap:
  # sunny/partlycloudy = разрешаем дольше удерживать SOL.
  # ------------------------------
  triggers:
  - trigger: template
    value_template: '{% set v = states(''sensor.napriazhenie_pv_pv_voltage'')|float(0)
      %} {% set i = states(''sensor.tok_pv_pv_current'')|float(0) %} {% set p = states(''sensor.moshchnost_pv_pv_power'')|float(0)
      %} {% set load = states(''sensor.moshchnost_nagruzki_load_power'')|float(0)
      %} {% set grid = states(''sensor.moshchnost_seti_grid_power'')|float(0) %}
      {% set batt_v = states(''sensor.napriazhenie_akb_battery_voltage'')|float(0) %}
      {% set weather_state = states(''weather.openweathermap'') %}
      {% set weather_sunny = weather_state in [''sunny'', ''partlycloudy''] %}
      {% set high_generation = v > 335 and (i > 3 or p > 900) %}
      {% set low_load_high_potential = v > 355 and load >= 70 and load <= 250 and grid < 250 %}
      {% set weather_keep_sol = weather_sunny and v > 325 and batt_v > 50.8 and grid < 450 %}
      {{ is_state(''sun.sun'', ''above_horizon'') and (high_generation or low_load_high_potential or weather_keep_sol) }}'
    for: 00:10:00
    id: to_sol_stable
  - trigger: template
    value_template: '{% set v = states(''sensor.napriazhenie_pv_pv_voltage'')|float(0)
      %} {% set i = states(''sensor.tok_pv_pv_current'')|float(0) %} {% set p = states(''sensor.moshchnost_pv_pv_power'')|float(0)
      %} {% set batt_v = states(''sensor.napriazhenie_akb_battery_voltage'')|float(0) %}
      {% set weather_state = states(''weather.openweathermap'') %}
      {% set weather_sunny = weather_state in [''sunny'', ''partlycloudy''] %}
      {# В SUB уходим по "слабому солнцу" только если погода НЕ солнечная.
         Исключение: при сильном проседании АКБ (<49В) разрешаем уход в SUB даже в солнечную погоду. #}
      {{ is_state(''sun.sun'', ''below_horizon'')
         or ((((v < 300 or p < 550) and i < 1.8) and (not weather_sunny)) or batt_v < 49.0) }}'
    for: 00:15:00
    id: to_sub_low_sun
  - trigger: numeric_state
    entity_id: sensor.moshchnost_seti_grid_power
    above: 700
    for: 00:08:00
    id: to_sub_grid_import_high
  - trigger: sun
    event: sunset
    offset: -00:30:00
    id: sub_before_sunset
  - trigger: time_pattern
    minutes: /15
    id: periodic_recheck
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id in [''to_sol_stable'', ''periodic_recheck'']
          }}'
      - condition: sun
        after: sunrise
        before: sunset
      - condition: template
        value_template: '{% set v = states(''sensor.napriazhenie_pv_pv_voltage'')|float(0)
          %} {% set i = states(''sensor.tok_pv_pv_current'')|float(0) %} {% set p
          = states(''sensor.moshchnost_pv_pv_power'')|float(0) %} {% set load = states(''sensor.moshchnost_nagruzki_load_power'')|float(0)
          %} {% set grid = states(''sensor.moshchnost_seti_grid_power'')|float(0)
          %} {% set batt_v = states(''sensor.napriazhenie_akb_battery_voltage'')|float(0)
          %} {% set weather_state = states(''weather.openweathermap'') %} {% set weather_sunny
          = weather_state in [''sunny'', ''partlycloudy''] %} {% set high_generation
          = v > 335 and (i > 3 or p > 900) %} {% set low_load_high_potential = v
          > 355 and load >= 70 and load <= 250 and grid < 250 %} {% set weather_keep_sol
          = weather_sunny and v > 325 and batt_v > 50.8 and grid < 450 %} {{ high_generation
          or low_load_high_potential or weather_keep_sol }}'
      - condition: template
        value_template: '{{ states(''input_select.anenji_cfg_program_01_output_source_priority'')
          != ''SOL'' }}'
      - condition: template
        value_template: '{{ (as_timestamp(now()) - as_timestamp(states.input_select.anenji_cfg_program_01_output_source_priority.last_changed))
          > 900 }}'
      sequence:
      - delay: 00:02:00
      - condition: template
        value_template: '{% set v = states(''sensor.napriazhenie_pv_pv_voltage'')|float(0)
          %} {% set i = states(''sensor.tok_pv_pv_current'')|float(0) %} {% set p
          = states(''sensor.moshchnost_pv_pv_power'')|float(0) %} {% set load = states(''sensor.moshchnost_nagruzki_load_power'')|float(0)
          %} {% set grid = states(''sensor.moshchnost_seti_grid_power'')|float(0)
          %} {% set batt_v = states(''sensor.napriazhenie_akb_battery_voltage'')|float(0)
          %} {% set weather_state = states(''weather.openweathermap'') %} {% set weather_sunny
          = weather_state in [''sunny'', ''partlycloudy''] %} {% set high_generation
          = v > 330 and (i > 2.5 or p > 800) %} {% set low_load_high_potential =
          v > 350 and load >= 70 and load <= 250 and grid < 300 %} {% set weather_keep_sol
          = weather_sunny and v > 320 and batt_v > 50.5 and grid < 500 %} {{ high_generation
          or low_load_high_potential or weather_keep_sol }}'
      - action: input_select.select_option
        target:
          entity_id: input_select.anenji_cfg_program_01_output_source_priority
        data:
          option: SOL
      - action: script.anenji_inverter_write_single_config_to_modbus
        data:
          target_entity_id: input_select.anenji_cfg_program_01_output_source_priority
    - conditions:
      - condition: template
        value_template: '{{ trigger.id in [''to_sub_low_sun'', ''to_sub_grid_import_high'',
          ''sub_before_sunset'', ''periodic_recheck''] }}'
      - condition: template
        value_template: '{% set v = states(''sensor.napriazhenie_pv_pv_voltage'')|float(0)
          %} {% set i = states(''sensor.tok_pv_pv_current'')|float(0) %} {% set p
          = states(''sensor.moshchnost_pv_pv_power'')|float(0) %} {% set grid = states(''sensor.moshchnost_seti_grid_power'')|float(0)
          %} {% set batt_v = states(''sensor.napriazhenie_akb_battery_voltage'')|float(0)
          %} {% set weather_state = states(''weather.openweathermap'') %} {% set weather_sunny
          = weather_state in [''sunny'', ''partlycloudy''] %} {{ is_state(''sun.sun'',
          ''below_horizon'') or ((((v < 300 or p < 550) and i < 1.8) and (not weather_sunny))
          or batt_v < 49.0) or grid > 700 }}'
      - condition: template
        value_template: '{{ states(''input_select.anenji_cfg_program_01_output_source_priority'')
          != ''SUB'' }}'
      - condition: template
        value_template: '{{ (as_timestamp(now()) - as_timestamp(states.input_select.anenji_cfg_program_01_output_source_priority.last_changed))
          > 900 }}'
      sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.anenji_cfg_program_01_output_source_priority
        data:
          option: SUB
      - action: script.anenji_inverter_write_single_config_to_modbus
        data:
          target_entity_id: input_select.anenji_cfg_program_01_output_source_priority
  mode: single
- id: anenji_program_01_set_from_mqtt
  alias: ANENJI Program 01 из MQTT в инвертор
  mode: queued
  trigger:
  - platform: mqtt
    topic: homeassistant/anenji/program_01/set
  variables:
    requested_mode: '{{ trigger.payload | upper | trim }}'
  condition:
  - condition: template
    value_template: '{{ requested_mode in [''UTI'', ''SOL'', ''SBU'', ''SUB'', ''SUF'']
      }}'
  action:
  - service: input_select.select_option
    target:
      entity_id: input_select.anenji_cfg_program_01_output_source_priority
    data:
      option: '{{ requested_mode }}'
  - service: script.anenji_inverter_write_single_config_to_modbus
    data:
      target_entity_id: input_select.anenji_cfg_program_01_output_source_priority
- id: anenji_program_01_publish_to_mqtt
  alias: ANENJI Program 01 публикация в MQTT
  mode: queued
  trigger:
  - platform: state
    entity_id: input_select.anenji_cfg_program_01_output_source_priority
  - platform: homeassistant
    event: start
  action:
  - service: mqtt.publish
    data:
      topic: homeassistant/anenji/program_01/state
      payload: '{{ states(''input_select.anenji_cfg_program_01_output_source_priority'')
        }}'
      retain: true
- id: anenji_surplus_power_publish_to_mqtt
  alias: ANENJI Surplus Power публикация в MQTT
  mode: queued
  trigger:
  - platform: state
    entity_id: sensor.anenji_surplus_power
  - platform: homeassistant
    event: start
  condition:
  - condition: template
    value_template: '{{ states(''sensor.anenji_surplus_power'') not in [''unknown'',
      ''unavailable'', ''none'', ''''] }}'
  action:
  - service: mqtt.publish
    data:
      topic: homeassistant/anenji/surplus_power/state
      payload: '{{ states(''sensor.anenji_surplus_power'') }}'
      retain: true