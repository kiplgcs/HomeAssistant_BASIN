# =========================
# Конфигурация инвертора ANENJI (Program 01..46)
# =========================
# Важно: файл должен содержать только валидный YAML.
input_select:
  anenji_cfg_program_01_output_source_priority:
    name: "Program 01 · Приоритет источника питания"
    options: ["UTI", "SOL", "SBU", "SUB", "SUF"]
    initial: "SBU"
  anenji_cfg_program_03_input_voltage_range:
    name: "Program 03 · Диапазон входного напряжения"
    options: ["APL", "UPS", "GEN"]
    initial: "UPS"
  anenji_cfg_program_05_battery_type:
    name: "Program 05 · Тип батареи"
    options: ["AGM", "Flooded", "User defined", "LI2", "LI4", "LIB"]
    initial: "AGM"
  anenji_cfg_program_06_charging_priority:
    name: "Program 06 · Приоритет зарядки"
    options: ["Solar first", "Solar + Utility", "Solar only"]
    initial: "Solar first"
  anenji_cfg_program_16_output_frequency_type:
    name: "Program 16 · Тип выходной частоты"
    options: ["50 Hz", "60 Hz"]
    initial: "50 Hz"
  anenji_cfg_program_17_charge_source_priority:
    name: "Program 17 · Приоритет источника зарядки"
    options: ["Solar first", "Solar + Utility", "Utility first", "Solar only"]
    initial: "Solar first"
  anenji_cfg_program_08_output_voltage:
    name: "Program 08 · Выходное напряжение"
    options: ["220V", "230V", "240V"]
    initial: "230V"
  anenji_cfg_program_09_output_frequency:
    name: "Program 09 · Выходная частота"
    options: ["50Hz", "60Hz"]
    initial: "50Hz"
  anenji_cfg_program_10_auto_bypass_mode:
    name: "Program 10 · Автообход (bypass)"
    options: ["AnL", "AEO"]
    initial: "AnL"
  anenji_cfg_program_18_buzzer_mode:
    name: "Program 18 · Режим зуммера"
    options: ["nd1", "nd2", "nd3", "nd4"]
    initial: "nd4"
  anenji_cfg_program_19_screen_return_mode:
    name: "Program 19 · Возврат экрана"
    options: ["CSP", "bEP"]
    initial: "CSP"
  anenji_cfg_program_20_backlight_mode:
    name: "Program 20 · Подсветка"
    options: ["LON", "LOF"]
    initial: "LON"
  anenji_cfg_program_23_overload_bypass:
    name: "Program 23 · Обход при перегрузке"
    options: ["bYd", "bYE"]
    initial: "bYE"
  anenji_cfg_program_32_cv_to_float_time_mode:
    name: "Program 32 · Время заряда (CV→Float)"
    options: ["AUT", "5", "10", "15", "30", "60", "120", "300", "600", "900"]
    initial: "AUT"
  anenji_cfg_program_46_overcharge_protection_mode:
    name: "Program 46 · Защита от макс. тока разряда"
    options: ["OFF", "50A"]
    initial: "OFF"
  anenji_cfg_program_45_bms_mode:
    name: "Program 45 · Режим BMS"
    options: ["Auto", "BMS managed", "Manual override"]
    initial: "Auto"

input_boolean:
  anenji_cfg_sync_from_inverter_active:
    name: "ANENJI · Синхронизация настроек из инвертора"
  anenji_cfg_program_04_power_saving:
    name: "Program 04 · Энергосбережение"
  anenji_cfg_program_07_overload_restart:
    name: "Program 07 · Перезапуск после перегрузки"
  anenji_cfg_program_08_overtemp_restart:
    name: "Program 08 · Перезапуск после перегрева"
  anenji_cfg_program_09_buzzer:
    name: "Program 09 · Звуковой сигнал"
  anenji_cfg_program_10_back_to_grid_auto:
    name: "Program 10 · Автовозврат к сети"
  anenji_cfg_program_33_equalization_enable:
    name: "Program 33 · Выравнивание батареи"
  anenji_cfg_program_39_force_equalization:
    name: "Program 39 · Принудительное выравнивание"
  anenji_cfg_program_44_bms_control_enable:
    name: "Program 44 · Контроль BMS"

input_number:
  anenji_cfg_program_02_max_charge_current:
    name: "Program 02 · Макс. ток зарядки (PV+AC), A"
    min: 0
    max: 90
    step: 1
    mode: box
    initial: 60
  anenji_cfg_program_11_max_ac_charge_current:
    name: "Program 11 · Макс. ток зарядки от сети, A"
    min: 0
    max: 90
    step: 1
    mode: box
    initial: 20
  anenji_cfg_program_12_back_to_utility_voltage:
    name: "Program 12 · Переход на сеть, V"
    min: 44
    max: 57.2
    step: 0.1
    mode: box
    initial: 48
  anenji_cfg_program_13_back_to_battery_voltage:
    name: "Program 13 · Возврат на батарею, V"
    min: 44
    max: 60
    step: 0.1
    mode: box
    initial: 54
  anenji_cfg_program_26_bulk_absorption_voltage:
    name: "Program 26 · Bulk/Absorption, V"
    min: 48
    max: 62
    step: 0.1
    mode: box
    initial: 56.4
  anenji_cfg_program_27_float_voltage:
    name: "Program 27 · Float, V"
    min: 48
    max: 58
    step: 0.1
    mode: box
    initial: 54.0
  anenji_cfg_program_29_low_dc_cutoff_voltage:
    name: "Program 29 · Low DC cut-off, V"
    min: 40
    max: 54
    step: 0.1
    mode: box
    initial: 46.0
  anenji_cfg_program_34_equalization_voltage:
    name: "Program 34 · Напряжение выравнивания, V"
    min: 48
    max: 64
    step: 0.1
    mode: box
    initial: 58.4
  anenji_cfg_program_35_equalization_time:
    name: "Program 35 · Время выравнивания, min"
    min: 0
    max: 900
    step: 1
    mode: box
    initial: 120
  anenji_cfg_program_36_equalization_timeout:
    name: "Program 36 · Таймер выравнивания, min"
    min: 0
    max: 900
    step: 1
    mode: box
    initial: 180
  anenji_cfg_program_37_equalization_interval_days:
    name: "Program 37 · Интервал выравнивания, days"
    min: 1
    max: 90
    step: 1
    mode: box
    initial: 30
  anenji_cfg_program_41_bms_charge_voltage:
    name: "Program 41 · BMS напряжение зарядки, V"
    min: 40
    max: 64
    step: 0.1
    mode: box
    initial: 56.0
  anenji_cfg_program_42_bms_cutoff_voltage:
    name: "Program 42 · BMS напряжение отключения, V"
    min: 40
    max: 64
    step: 0.1
    mode: box
    initial: 44.0
  anenji_cfg_program_43_bms_charge_current:
    name: "Program 43 · BMS ток зарядки, A"
    min: 0
    max: 140
    step: 1
    mode: box
    initial: 60
  anenji_cfg_program_25_modbus_id:
    name: "Program 25 · Modbus ID"
    min: 1
    max: 247
    step: 1
    mode: box
    initial: 1

input_text:
  anenji_cfg_profile_name:
    name: "Профиль конфигурации"
    initial: "default"
    max: 64
  anenji_cfg_snapshot_json:
    name: "Снимок конфигурации (JSON)"
    initial: "{}"
    max: 255
  anenji_cfg_manual_overrides_json:
    name: "Ручные override-параметры (JSON)"
    initial: "{}"
    max: 255
  anenji_cfg_last_published_payload:
    name: "Последний отправленный payload"
    initial: ""
    max: 255
  anenji_cfg_last_received_payload:
    name: "Последний полученный payload"
    initial: ""
    max: 255

script:
  anenji_inverter_sync_config_from_modbus:
    alias: "ANENJI: Синхронизировать параметры из Modbus в helpers"
    mode: restart
    sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.anenji_cfg_sync_from_inverter_active
  anenji_inverter_write_single_config_to_modbus:
    alias: "ANENJI: Записать в Modbus выбранный параметр формы"
    mode: queued
    fields:
      target_entity_id:
        description: "Entity ID helper-параметра для отправки в инвертор"
        example: "input_number.anenji_cfg_program_12_back_to_utility_voltage"
    variables:
      config_map: >-
        {{ {
          'input_select.anenji_cfg_program_01_output_source_priority': {'program': 1, 'address': 301, 'value': {'UTI':0, 'SOL':1, 'SBU':2, 'SUB':3, 'SUF':4}[states('input_select.anenji_cfg_program_01_output_source_priority')]},
          'input_number.anenji_cfg_program_02_max_charge_current': {'program': 2, 'address': 332, 'value': (states('input_number.anenji_cfg_program_02_max_charge_current')|float(0) * 10)|round(0)|int},
          'input_select.anenji_cfg_program_03_input_voltage_range': {'program': 3, 'address': 302, 'value': {'APL':0, 'UPS':1, 'GEN':2}[states('input_select.anenji_cfg_program_03_input_voltage_range')]},
          'input_boolean.anenji_cfg_program_04_power_saving': {'program': 4, 'address': 307, 'value': 1 if is_state('input_boolean.anenji_cfg_program_04_power_saving', 'on') else 0},
          'input_select.anenji_cfg_program_05_battery_type': {'program': 5, 'address': 322, 'value': {'AGM':0, 'Flooded':1, 'User defined':2, 'LI2':3, 'LI4':4, 'LIB':5}[states('input_select.anenji_cfg_program_05_battery_type')]},
          'input_select.anenji_cfg_program_06_charging_priority': {'program': 6, 'address': 331, 'value': {'Solar first':0, 'Solar + Utility':1, 'Solar only':2}[states('input_select.anenji_cfg_program_06_charging_priority')]},
          'input_boolean.anenji_cfg_program_07_overload_restart': {'program': 7, 'address': 308, 'value': 1 if is_state('input_boolean.anenji_cfg_program_07_overload_restart', 'on') else 0},
          'input_boolean.anenji_cfg_program_08_overtemp_restart': {'program': '08A', 'address': 309, 'value': 1 if is_state('input_boolean.anenji_cfg_program_08_overtemp_restart', 'on') else 0},
          'input_select.anenji_cfg_program_08_output_voltage': {'program': '08B', 'address': 320, 'value': states('input_select.anenji_cfg_program_08_output_voltage')|replace('V','')|int(230) * 10},
          'input_boolean.anenji_cfg_program_09_buzzer': {'program': '09A', 'address': 303, 'value': 1 if is_state('input_boolean.anenji_cfg_program_09_buzzer', 'on') else 0},
          'input_select.anenji_cfg_program_09_output_frequency': {'program': '09B', 'address': 321, 'value': states('input_select.anenji_cfg_program_09_output_frequency')|replace('Hz','')|int(50) * 100},
          'input_boolean.anenji_cfg_program_10_back_to_grid_auto': {'program': '10A', 'address': 338, 'value': 1 if is_state('input_boolean.anenji_cfg_program_10_back_to_grid_auto', 'on') else 0},
          'input_number.anenji_cfg_program_11_max_ac_charge_current': {'program': 11, 'address': 333, 'value': (states('input_number.anenji_cfg_program_11_max_ac_charge_current')|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_12_back_to_utility_voltage': {'program': 12, 'address': 327, 'value': (states('input_number.anenji_cfg_program_12_back_to_utility_voltage')|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_13_back_to_battery_voltage': {'program': 13, 'address': 326, 'value': (states('input_number.anenji_cfg_program_13_back_to_battery_voltage')|float(0) * 10)|round(0)|int},
          'input_select.anenji_cfg_program_20_backlight_mode': {'program': 20, 'address': 305, 'value': {'LOF':0, 'LON':1}[states('input_select.anenji_cfg_program_20_backlight_mode')]},
          'input_select.anenji_cfg_program_23_overload_bypass': {'program': 23, 'address': 310, 'value': {'bYd':0, 'bYE':1}[states('input_select.anenji_cfg_program_23_overload_bypass')]},
          'input_number.anenji_cfg_program_26_bulk_absorption_voltage': {'program': 26, 'address': 324, 'value': (states('input_number.anenji_cfg_program_26_bulk_absorption_voltage')|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_27_float_voltage': {'program': 27, 'address': 325, 'value': (states('input_number.anenji_cfg_program_27_float_voltage')|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_29_low_dc_cutoff_voltage': {'program': 29, 'address': 329, 'value': (states('input_number.anenji_cfg_program_29_low_dc_cutoff_voltage')|float(0) * 10)|round(0)|int},
          'input_select.anenji_cfg_program_32_cv_to_float_time_mode': {'program': 32, 'address': 330, 'value': 0 if states('input_select.anenji_cfg_program_32_cv_to_float_time_mode') == 'AUT' else states('input_select.anenji_cfg_program_32_cv_to_float_time_mode')|int(0)},
          'input_boolean.anenji_cfg_program_33_equalization_enable': {'program': 33, 'address': 313, 'value': 1 if is_state('input_boolean.anenji_cfg_program_33_equalization_enable', 'on') else 0},
          'input_number.anenji_cfg_program_34_equalization_voltage': {'program': 34, 'address': 334, 'value': (states('input_number.anenji_cfg_program_34_equalization_voltage')|float(0) * 10)|round(0)|int},
          'input_number.anenji_cfg_program_35_equalization_time': {'program': 35, 'address': 335, 'value': states('input_number.anenji_cfg_program_35_equalization_time')|int(0)},
          'input_number.anenji_cfg_program_36_equalization_timeout': {'program': 36, 'address': 336, 'value': states('input_number.anenji_cfg_program_36_equalization_timeout')|int(0)},
          'input_number.anenji_cfg_program_37_equalization_interval_days': {'program': 37, 'address': 337, 'value': states('input_number.anenji_cfg_program_37_equalization_interval_days')|int(0)},
          'input_select.anenji_cfg_program_46_overcharge_protection_mode': {'program': 46, 'address': 351, 'value': 0 if states('input_select.anenji_cfg_program_46_overcharge_protection_mode') == 'OFF' else states('input_select.anenji_cfg_program_46_overcharge_protection_mode')|replace('A','')|int(0)}
        } }}
      selected: >-
        {{ config_map.get(target_entity_id) }}
    sequence:
      - condition: template
        value_template: "{{ selected is mapping }}"
      - service: modbus.write_register
        data:
          hub: ANENJI_6200W
          slave: 1
          address: "{{ selected.address }}"
          value: "{{ [selected.value] }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.anenji_cfg_last_published_payload
        data:
          value: >-
            {{
              {
                "source": "manual_apply_single",
                "entity_id": target_entity_id,
                "program": selected.program
              } | tojson
            }}
      - service: script.turn_on
        target:
          entity_id: script.anenji_inverter_sync_config_from_modbus

automation:
  - alias: "ANENJI: Синхронизировать helpers из Modbus при старте и по расписанию"
    id: anenji_sync_config_from_modbus_periodic
    trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: '/5'
    action:
      - service: script.turn_on
        target:
          entity_id: script.anenji_inverter_sync_config_from_modbus